<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Circle of Love - L！L！L！</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* ========== 开场动画 ========== */
    .intro {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #000010;
      transition: opacity 1s ease;
    }
    .intro.fade-out { opacity: 0; pointer-events: none; }
    .intro.hidden { display: none; }

    /* 星空 */
    .stars { position: absolute; width: 100%; height: 100%; }
    .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--d) ease-in-out infinite; }
    @keyframes twinkle { 0%,100%{opacity:.2;transform:scale(1)} 50%{opacity:.9;transform:scale(1.3)} }

    /* 中心发光核心 */
    .core {
      position: absolute;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: radial-gradient(circle,#fff,#ffe080);
      box-shadow: 0 0 40px 20px rgba(255,200,80,.7), 0 0 80px 40px rgba(255,150,50,.3);
      animation: core-pulse 2s ease-in-out infinite;
    }
    @keyframes core-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }

    /* 三层环形（简化版，无心形） */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
    }
    .ring-1 { width: 160px; height: 160px; border-color: rgba(255,255,255,.8); box-shadow: 0 0 20px rgba(255,255,255,.4); animation: ring-spin 6s linear infinite; }
    .ring-2 { width: 240px; height: 240px; border-color: rgba(255,200,100,.5); box-shadow: 0 0 20px rgba(255,180,80,.3); animation: ring-spin 10s linear infinite reverse; }
    .ring-3 { width: 320px; height: 320px; border-color: rgba(200,150,255,.4); box-shadow: 0 0 20px rgba(180,120,255,.25); animation: ring-spin 14s linear infinite; }
    @keyframes ring-spin { from{transform:translate(-50%,-50%) rotateX(60deg) rotateZ(0deg)} to{transform:translate(-50%,-50%) rotateX(60deg) rotateZ(360deg)} }

    /* 文字 */
    .t-en { position: absolute; font-size: 11px; letter-spacing: 8px; color: rgba(255,255,255,.5); text-transform: uppercase; animation: fade-up .8s ease .3s both; }
    .t-main { position: absolute; font-size: 30px; font-weight: 700; letter-spacing: 3px; background: linear-gradient(90deg,#ff7090,#c080e0,#6080ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 15px rgba(200,120,220,.6)); animation: fade-up .8s ease .5s both; }
    .t-cn { position: absolute; font-size: 12px; letter-spacing: 6px; color: rgba(255,220,150,.7); animation: fade-up .8s ease .7s both; }
    @keyframes fade-up { 0%{opacity:0;transform:translateY(15px)} 100%{opacity:1;transform:translateY(0)} }

    /* ========== 主内容 ========== */
    .main {
      display: none; opacity: 0;
      transition: opacity .8s ease;
      width: 100%; max-width: 480px; padding: 20px;
    }
    .main.show { display: block; opacity: 1; }

    /* 封面图+信息左右布局 */
    .card {
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 24px;
      display: flex; align-items: center; gap: 20px;
      animation: card-in .8s cubic-bezier(.4,0,.2,1) .1s both;
    }
    @keyframes card-in { 0%{transform:scale(.9);opacity:0} 100%{transform:scale(1);opacity:1} }

    .album-art {
      width: 100px; height: 100px; border-radius: 14px; object-fit: cover;
      box-shadow: 0 8px 30px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.08);
      flex-shrink: 0;
    }

    .info { flex: 1; min-width: 0; }
    .song-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-sub { font-size: 12px; color: rgba(255,255,255,.5); margin-bottom: 16px; }

    .play-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px; border-radius: 50px;
      background: linear-gradient(90deg,#e03060,#c02050);
      border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(200,30,60,.4);
      font-size: 14px; font-weight: 600; color: #fff; letter-spacing: 2px;
      transition: all .2s;
    }
    .play-btn:active { transform: scale(.95); }
    .play-btn svg { width: 14px; height: 14px; fill: #fff; }

    .hint { margin-top: 12px; font-size: 11px; color: rgba(255,255,255,.25); text-align: center; }
    .status { margin-top: 12px; font-size: 12px; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1); color: rgba(255,255,255,.6); opacity: 0; transition: opacity .3s; text-align: center; }
    .status.show { opacity: 1; }
    .status.ok { color: #4ade80; border-color: rgba(74,222,128,.3); background: rgba(74,222,128,.08); }
    .status.fail { color: #f87171; border-color: rgba(248,113,113,.3); background: rgba(248,113,113,.08); }
    .fallback { display: none; margin-top: 10px; font-size: 12px; color: rgba(255,255,255,.4); background: none; border: none; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
    .fallback.show { display: block; }
    .nfc { position: fixed; bottom: 20px; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(255,255,255,.2); }
  </style>
</head>
<body>

  <!-- ========== 开场动画 ========== -->
  <div class="intro" id="intro">
    <div class="stars" id="stars"></div>
    <div class="core"></div>
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="t-en" style="bottom:calc(50% + 130px);">Circle of Love</div>
    <div class="t-main" style="bottom:calc(50% + 80px);">L！L！L！</div>
    <div class="t-cn" style="bottom:calc(50% + 45px);">爱的回环</div>
  </div>

  <!-- ========== 主内容 ========== -->
  <div class="main" id="main">
    <div class="card">
      <img class="album-art" src="https://4ad2f463258bc8e2-106-53-185-132.serveousercontent.com/album-cover.jpg" alt="album">
      <div class="info">
        <div class="song-title">L！L！L！</div>
        <div class="song-sub">宮下愛 · Circle of Love</div>
        <button class="play-btn" id="playBtn" onclick="startPlay()">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          开始播放
        </button>
      </div>
    </div>
    <div class="hint" id="hint">👆 轻触按钮启动网易云音乐</div>
    <div class="status" id="status"></div>
    <button class="fallback" id="fallback" onclick="openWeb()">未能启动？点此打开网页版</button>
  </div>
  <div class="nfc">📳 NFC 碰一碰 · 网易云音乐</div>

<script>
// 星空
(function(){
  var c=document.getElementById('stars');
  for(var i=0;i<40;i++){
    var s=document.createElement('div');
    s.className='star';
    var sz=1+Math.random()*2;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;--d:'+(1.5+Math.random()*2)+'s;animation-delay:'+Math.random()*3+'s';
    c.appendChild(s);
  }
})();

// 4秒后切换
setTimeout(function(){
  document.getElementById('intro').classList.add('fade-out');
  setTimeout(function(){
    document.getElementById('intro').classList.add('hidden');
    document.getElementById('main').classList.add('show');
  },1000);
}, 4000);

// 播放逻辑
var SONG_ID='1887056125';
var NETEASE_SCHEME='orpheus://song/'+SONG_ID;
var ANDROID_INTENT='intent://orpheus/song/'+SONG_ID+'#Intent;scheme=orpheus;package=com.netease.cloudmusic;end';
var WEB_URL='https://y.music.163.com/m/song?id='+SONG_ID;
var isAndroid=/Android/i.test(navigator.userAgent);
var playing=false, launched=false;
var status=document.getElementById('status');
var hint=document.getElementById('hint');
var fallback=document.getElementById('fallback');

function showStatus(msg,cls){ status.textContent=msg; status.className='status show '+(cls||''); }
function openWeb(){ window.location.href=WEB_URL; }

function startPlay(){
  if(playing)return;
  playing=true; launched=false;
  hint.style.display='none';
  showStatus('正在启动网易云音乐…','');
  if(isAndroid){
    window.location.href=ANDROID_INTENT;
    setTimeout(function(){ if(!document.hidden&&!launched){launched=true;window.location.href=NETEASE_SCHEME;} },1200);
    setTimeout(function(){ if(!document.hidden&&!launched){launched=true;fallback.classList.add('show');} },2500);
  } else {
    window.location.href=NETEASE_SCHEME;
    setTimeout(function(){ if(!document.hidden)openWeb(); },2000);
  }
}
document.addEventListener('visibilitychange',function(){
  if(document.hidden){launched=true;showStatus('🎉 已启动','');}
});
</script>
</body>
</html>
