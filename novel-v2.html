<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大道之爭</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050508; min-height: 100vh; font-family: system-ui, sans-serif; overflow: hidden; }
#scene { position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 30%, #0d0a18 0%, #050508 70%); }
#scene::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 90%, rgba(180,40,40,.06) 0%, transparent 50%), radial-gradient(ellipse at 70% 90%, rgba(40,60,160,.06) 0%, transparent 50%); }
#scene::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 35%; background: linear-gradient(to top, rgba(0,0,0,.5) 0%, transparent 100%); }

#char-layer { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
.char { position: absolute; bottom: 10%; height: 75%; display: flex; align-items: flex-end; opacity: 0; transition: opacity .6s ease, transform .6s ease; }
.char.left { left: 0; justify-content: flex-start; }
.char.right { right: 0; justify-content: flex-end; }
.char.center { left: 50%; transform: translateX(-50%); bottom: 8%; }
.char.visible { opacity: 1; }
.char.dim { opacity: .35; }
.char img { height: 100%; width: auto; object-fit: contain; filter: drop-shadow(0 0 20px rgba(0,0,0,.8)); }

#glow { position: absolute; inset: 0; pointer-events: none; z-index: 4; opacity: 0; transition: opacity .5s ease; }
#glow.faqi { background: radial-gradient(ellipse at 30% 60%, rgba(180,40,40,.25) 0%, transparent 60%); }
#glow.rujia { background: radial-gradient(ellipse at 70% 60%, rgba(200,160,60,.25) 0%, transparent 60%); }
#glow.active { opacity: 1; }

#dialogue-box { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: linear-gradient(to top, rgba(5,3,12,.97) 0%, rgba(5,3,12,.88) 85%, transparent 100%); padding: 20px 24px 32px; transform: translateY(110%); transition: transform .4s cubic-bezier(.4,0,.2,1); }
#dialogue-box.show { transform: translateY(0); }
#speaker { color: #c8a04a; font-size: 13px; letter-spacing: 4px; margin-bottom: 10px; text-shadow: 0 0 12px rgba(200,160,74,.4); }
#speaker.faqi { color: #c04040; text-shadow: 0 0 12px rgba(192,64,64,.4); }
#speaker.rujia { color: #c8a04a; text-shadow: 0 0 12px rgba(200,160,74,.4); }
#speaker.narrator { color: rgba(255,255,255,.4); }
#speaker.zhuti { color: #5090d0; text-shadow: 0 0 12px rgba(80,144,208,.4); }
#text { color: #e8e0d0; font-size: 16px; line-height: 1.85; min-height: 60px; letter-spacing: .5px; }
#tap-hint { position: fixed; bottom: 110px; right: 20px; color: rgba(255,255,255,.25); font-size: 11px; letter-spacing: 2px; z-index: 101; animation: pulse-hint 1.5s ease-in-out infinite; }
@keyframes pulse-hint { 0%,100%{opacity:.25} 50%{opacity:.6} }
#tap-hint.hide { display: none; }

#choices { position: fixed; bottom: 170px; left: 50%; transform: translateX(-50%); z-index: 110; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 520px; opacity: 0; transition: opacity .4s ease; pointer-events: none; }
#choices.show { opacity: 1; pointer-events: all; }
.choice { background: rgba(8,6,16,.95); border: 1px solid rgba(200,160,74,.35); color: #c8a04a; padding: 14px 18px; border-radius: 8px; font-size: 14px; cursor: pointer; text-align: left; letter-spacing: .5px; transition: all .2s ease; backdrop-filter: blur(8px); }
.choice:hover { background: rgba(200,160,74,.12); border-color: rgba(200,160,74,.7); box-shadow: 0 0 18px rgba(200,160,74,.15); transform: translateX(4px); }

#title { position: fixed; inset: 0; z-index: 300; background: radial-gradient(ellipse at 50% 40%, #0a0618 0%, #050508 70%); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 1s ease; }
#title.hide { opacity: 0; pointer-events: none; }
#title h1 { color: #c8a04a; font-size: 32px; letter-spacing: 10px; text-shadow: 0 0 40px rgba(200,160,74,.4), 0 0 80px rgba(200,160,74,.15); margin-bottom: 8px; }
#title p { color: rgba(255,255,255,.25); font-size: 11px; letter-spacing: 5px; margin-bottom: 50px; }
#start-btn { padding: 13px 44px; border: 1px solid rgba(200,160,74,.45); background: transparent; color: #c8a04a; font-size: 13px; letter-spacing: 4px; cursor: pointer; border-radius: 4px; transition: all .3s; }
#start-btn:hover { background: rgba(200,160,74,.1); box-shadow: 0 0 28px rgba(200,160,74,.2); }

#end-screen { position: fixed; inset: 0; z-index: 400; background: rgba(5,3,12,.96); display: none; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 1.5s ease forwards; }
#end-screen.show { display: flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
#end-title { color: #c8a04a; font-size: 22px; letter-spacing: 6px; text-shadow: 0 0 30px rgba(200,160,74,.4); margin-bottom: 12px; }
#end-sub { color: rgba(255,255,255,.35); font-size: 13px; letter-spacing: 2px; margin-bottom: 40px; text-align: center; padding: 0 20px; }
#end-stats { color: rgba(255,255,255,.2); font-size: 11px; letter-spacing: 3px; margin-bottom: 40px; }
#replay-btn { padding: 12px 36px; border: 1px solid rgba(200,160,74,.4); background: transparent; color: #c8a04a; font-size: 13px; letter-spacing: 3px; cursor: pointer; border-radius: 4px; }
#replay-btn:hover { background: rgba(200,160,74,.1); }
</style>
</head>
<body>

<div id="title">
  <h1>大道之爭</h1>
  <p>THE WAR OF DOCTRINES</p>
  <button id="start-btn" onclick="startGame()">進入遊戲</button>
</div>

<div id="scene"></div>
<div id="glow"></div>

<div id="char-layer">
  <div class="char left" id="c-shangchen"><img id="i-shangchen" src=""></div>
  <div class="char right" id="c-mengzi"><img id="i-mengzi" src=""></div>
  <div class="char center" id="c-zhuti"><img id="i-zhuti" src=""></div>
</div>

<div id="dialogue-box">
  <div id="speaker"></div>
  <div id="text"></div>
</div>
<div id="tap-hint">點擊繼續</div>

<div id="choices"></div>

<div id="end-screen">
  <div id="end-title"></div>
  <div id="end-sub"></div>
  <div id="end-stats"></div>
  <button id="replay-btn" onclick="location.reload()">重玩</button>
</div>

<script>
const BASE = 'https://16df4b2f55fe6953-106-53-185-132.serveousercontent.com';
const IMG = { shangchen: BASE+'/shangchen.jpg', mengzi: BASE+'/mengzi.jpg', zhuti: BASE+'/protagonist.jpg' };
const S = []; // script
let idx = 0, typing = false, done = false, faqi = 0, rujia = 0;

function init() {
  Object.keys(IMG).forEach(k => { document.getElementById('i-'+k).src = IMG[k]; });

S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '秦王政十二年 · 咸陽咸宮' });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '秦國大殿，七國使臣雲集。今日是秦王設下的「以言定策」——三個問題，三種回答，勝者得三城。' });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '你，一位無派別的遊士，坐在大殿最末席。左右兩側，分別端坐著——' });
S.push({ t: 'char', who: 'shangchen', pos: 'left' });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '商臣，韓非子後裔，法家嫡傳，據說舌戰七國未嘗一敗。' });
S.push({ t: 'char', who: 'mengzi', pos: 'right' });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '孟軻，儒家飽學之儒，周遊列國而不得用，卻在此處與法家對坐。' });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '秦王高坐，聲如寒冰：「三個問題，請三位作答。第一問——」' });
S.push({ t: 'nar', s: '秦王', c: 'narrator', m: '「天下大亂，病因何在？」' });

S.push({ t: 'say', s: '商臣', c: 'faqi', m: '「天下大亂，病因唯有一字——弱。弱肉強食，此天道也。諸侯弱，故相征；人心弱，故作亂。治亂之道，在於以刑名立威，使民畏法而不敢犯。」', g: 'faqi' });
S.push({ t: 'say', s: '孟軻', c: 'rujia', m: '「不然。天下之亂，亂於失德。諸侯攻城略地，是因無仁政；人心不古，是因無教化。以力服人者，非心服也；以德服人者，斯四方來服。」', g: 'rujia' });
S.push({ t: 'say', s: '秦王', c: 'narrator', m: '「遊士，你以為如何？」' });
S.push({ t: 'say', s: '你', c: 'zhuti', m: '「……」（請做出你的選擇）' });

S.push({ t: 'choice', o: [
  { m: '「我贊同法家。仁義說得再好聽，諸侯不聽。有刑名約束，方能定天下。」', f: 2, r: -1, n: 100 },
  { m: '「我贊同儒家。強秦以力統一，卻以何守？二世而亡者，前車之鑑。」', f: -1, r: 2, n: 200 },
  { m: '「敢問二位——諸侯所征者，何地？所教者，何民？若無民，何來天下？」', f: 1, r: 1, n: 300 }
]});

// 分支100
S.push({ t: 'label', id: 100 });
S.push({ t: 'say', s: '商臣', c: 'faqi', m: '「善。你見過山火嗎？林中枯木積久，一火焚之，方有新芽破土。我之刑法，非殘忍，乃是新秩序的播種。」', g: 'faqi' });
S.push({ t: 'say', s: '孟軻', c: 'rujia', m: '「以草木喻人，未免輕賤。民非枯木，乃有血有肉之人。以刑驅之，所得者非心，乃恐懼之奴。」', g: 'rujia' });
S.push({ t: 'say', s: '秦王', c: 'narrator', m: '「第二問——統一天下，當用何道？」' });
S.push({ t: 'say', s: '商臣', c: 'faqi', m: '「霸道。以戰為和，以刑為教。秦之鐵騎，便是天下最好的道理。」', g: 'faqi' });
S.push({ t: 'say', s: '孟軻', c: 'rujia', m: '「王道。以德為政，以民為本。域民不以封疆之界，威天下不以兵革之利。」', g: 'rujia' });
S.push({ t: 'choice', o: [
  { m: '「霸道一時爽，王道萬世昌。短長之論，何必急於一時？」', f: 1, r: 2, n: 101 },
  { m: '「秦之鐵騎，諸侯擋不住。此乃實力，非道理。」', f: 2, r: -2, n: 101 }
]});

// 分支200
S.push({ t: 'label', id: 200 });
S.push({ t: 'say', s: '孟軻', c: 'rujia', m: '「善。民心如水，水能載舟，亦能覆舟。得民心者，得天下。」', g: 'rujia' });
S.push({ t: 'say', s: '商臣', c: 'faqi', m: '「可笑。民如水，卻不知水能決堤。沒有刑名約束，民變不過一聲吶喊。」', g: 'faqi' });
S.push({ t: 'say', s: '秦王', c: 'narrator', m: '「第二問——統一天下，當用何道？」' });
S.push({ t: 'choice', o: [
  { m: '「以力統一，以德守成——霸道開路，王道收官。」', f: 1, r: 2, n: 201 },
  { m: '「秦王雄才大略，何必問我？我只想靜觀其變。」', f: 1, r: 1, n: 201 }
]});

// 分支300
S.push({ t: 'label', id: 300 });
S.push({ t: 'say', s: '商臣', c: 'faqi', m: '「問得好。但民之於國，如水之於渠。渠正則水清，渠斜則水濁。刑名者，渠也。」', g: 'faqi' });
S.push({ t: 'say', s: '孟軻', c: 'rujia', m: '「若民心本善，何須渠來正之？刑名是堵，水善下而攻，堵之不竭。」', g: 'rujia' });
S.push({ t: 'say', s: '秦王', c: 'narrator', m: '「有點意思。第二問——統一天下，誰來統？」' });
S.push({ t: 'choice', o: [
  { m: '「有道則見，無道則隱。天命所歸，何必問我是誰。」', f: 0, r: 2, n: 301 },
  { m: '「秦有此力，秦便統。歷史由勝者書寫。」', f: 2, r: -1, n: 301 }
]});

// 结局101
S.push({ t: 'label', id: 101 });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '秦王大笑，起身離席。「法家之言，朕愛聽。但遊士之答，亦有意味。」' });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '你被任為一小吏，從此捲入秦國朝堂的漩渦之中——' });
S.push({ t: 'end', m: '【結局：灰色地帶】', sub: '你在法律與道德之間找到了自己的位置。' });

// 结局201
S.push({ t: 'label', id: 201 });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '秦王沉吟良久，起身向外走去。經過你身側時，他忽然停下。' });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '「你叫什麼名字？」' });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '……' });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '這是你第一次被秦王正眼相看。你知道，一切從此不同了。' });
S.push({ t: 'end', m: '【結局：儒法並存】', sub: '你試圖在理想與現實之間找到橋樑，秦王的注視改變了你的命運。' });

// 结局301
S.push({ t: 'label', id: 301 });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '大殿忽然安靜。' });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '商臣皺眉，孟軻微笑，秦王注視著你——這個無派別的遊士，說出了他們都沒有想到的問題。' });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '「有趣。」秦王起身，「此事容后再議。」' });
S.push({ t: 'nar', s: '旁白', c: 'narrator', m: '你轉身離開大殿，卻知道——你的話，已經在秦王心裡種下了什麼。' });
S.push({ t: 'end', m: '【結局：天道觀察者】', sub: '你不屬於任何一派，卻讓所有派別都開始思考。' });

// ===== 引擎 =====
const $speaker = document.getElementById('speaker');
const $text = document.getElementById('text');
const $box = document.getElementById('dialogue-box');
const $tap = document.getElementById('tap-hint');
const $choices = document.getElementById('choices');
const $glow = document.getElementById('glow');

function showChar(who, pos) {
  ['shangchen','mengzi','zhuti'].forEach(c => {
    const el = document.getElementById('c-'+c);
    el.className = 'char ' + (c === who ? pos : (c === 'shangchen' ? 'left' : c === 'mengzi' ? 'right' : 'center'));
    el.classList.add('visible');
    if (c !== who) el.classList.add('dim');
  });
}

function hideChars() {
  ['shangchen','mengzi','zhuti'].forEach(c => {
    const el = document.getElementById('c-'+c);
    el.classList.remove('visible','dim');
  });
}

let typeTimer = null;
function typeText(text, cb) {
  clearInterval(typeTimer);
  $text.textContent = '';
  let i = 0;
  typing = true; $tap.classList.add('hide');
  typeTimer = setInterval(() => {
    if (i < text.length) { $text.textContent += text[i++]; }
    else { clearInterval(typeTimer); typing = false; $tap.classList.remove('hide'); if (cb) cb(); }
  }, 35);
}

function showChoices(opts) {
  $choices.innerHTML = '';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'choice'; b.textContent = o.m;
    b.onclick = () => {
      if (o.f) faqi += o.f;
      if (o.r) rujia += o.r;
      $choices.classList.remove('show');
      idx = S.findIndex((s, i) => i > idx && s.t === 'label' && s.id === o.n);
      if (idx < 0) idx = S.length;
      setTimeout(play, 300);
    };
    $choices.appendChild(b);
  });
  $choices.classList.add('show');
}

function play() {
  if (idx >= S.length) return;
  const s = S[idx];

  if (s.t === 'nar') {
    $speaker.textContent = s.s; $speaker.className = s.c;
    $box.classList.add('show'); typeText(s.m, () => {});
  }
  else if (s.t === 'say') {
    $speaker.textContent = s.s; $speaker.className = s.c;
    if (s.g) { $glow.className = s.g + ' active'; setTimeout(() => $glow.className = s.g, 1500); }
    $box.classList.add('show'); typeText(s.m, () => {});
  }
  else if (s.t === 'char') {
    hideChars(); showChar(s.who, s.pos); idx++; play(); return;
  }
  else if (s.t === 'choice') {
    $box.classList.remove('show');
    setTimeout(() => showChoices(s.o), 200);
    return;
  }
  else if (s.t === 'end') {
    $box.classList.remove('show');
    document.getElementById('end-title').textContent = s.m;
    document.getElementById('end-sub').textContent = s.sub || '';
    document.getElementById('end-stats').textContent = '法家 ' + (faqi>=0?'+':'') + faqi + '　 儒家 ' + (rujia>=0?'+':'') + rujia;
    document.getElementById('end-screen').classList.add('show');
    return;
  }
  else if (s.t === 'label') { idx++; play(); return; }
}

function advance() {
  if (idx >= S.length) return;
  const s = S[idx];
  if (s.t === 'choice' || s.t === 'end' || s.t === 'label') return;
  if (typing) { clearInterval(typeTimer); $text.textContent = S[idx].m || S[idx].s; typing = false; $tap.classList.remove('hide'); return; }
  idx++; play();
}

document.addEventListener('click', (e) => {
  if (e.target.closest('#choices') || e.target.closest('#start-btn') || e.target.closest('#replay-btn')) return;
  if (document.getElementById('title').classList.contains('hide') === false) return;
  advance();
});

function startGame() {
  document.getElementById('title').classList.add('hide');
  setTimeout(() => { document.getElementById('title').style.display = 'none'; }, 1000);
  setTimeout(play, 800);
}

init();
</script>
</body>
</html>
