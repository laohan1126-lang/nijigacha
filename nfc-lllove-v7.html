<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>L！L！L！- NFC 音乐卡</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      color: #fff;
      padding: 20px;
      overflow: hidden;
    }

    .glow {
      position: fixed;
      width: 300px; height: 300px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      pointer-events: none;
    }
    .glow-1 { top: -50px; left: -50px; background: #ff4060; animation: float-glow 6s ease-in-out infinite; }
    .glow-2 { bottom: -80px; right: -60px; background: #9b4dca; animation: float-glow 8s ease-in-out infinite reverse; }
    @keyframes float-glow {
      0%, 100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(20px,20px) scale(1.1); }
    }

    .disc-container { position: relative; width: 200px; height: 200px; margin-bottom: 36px; }
    .disc {
      width: 200px; height: 200px; border-radius: 50%;
      background: linear-gradient(135deg, #2a2a3e, #1a1a2e);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 0 30px rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
      animation: rotate-disc 8s linear infinite;
      animation-play-state: paused;
    }
    .disc.playing { animation-play-state: running; }
    @keyframes rotate-disc { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .disc-center {
      width: 70px; height: 70px; border-radius: 50%;
      background: linear-gradient(135deg, #ff6b8a, #ff4060);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(200,45,58,0.4);
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    }
    .disc-center::after { content: ''; width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,0.3); }
    .disc-grooves {
      position: absolute; width: 100%; height: 100%; border-radius: 50%;
      background: repeating-radial-gradient(circle at center, transparent 30px, rgba(255,255,255,0.03) 31px, rgba(255,255,255,0.03) 32px, transparent 33px, transparent 40px);
    }

    .song-title { font-size: 26px; font-weight: 700; letter-spacing: 1px; margin-bottom: 6px; text-align: center; }
    .song-artist { font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 50px; text-align: center; }

    .play-btn {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, #ff6b8a, #ff4060);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 30px rgba(255,64,96,0.5), 0 0 0 8px rgba(255,64,96,0.15);
      transition: all 0.2s ease; position: relative;
    }
    .play-btn:active { transform: scale(0.94); }
    .play-btn svg { width: 28px; height: 28px; fill: #fff; margin-left: 3px; }
    .pulse-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid #ff4060; animation: pulse-out 1.5s ease-out infinite; opacity: 0; }
    .pulse-ring:nth-child(2) { animation-delay: 0.5s; }
    @keyframes pulse-out { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.6); opacity: 0; } }

    /* 自动播放提示 */
    .auto-hint {
      margin-top: 30px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      display: none;
    }
    .auto-hint.show { display: block; }
    .auto-hint button {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 10px;
    }
    .auto-hint button:active { background: rgba(255,255,255,0.15); }

    .status {
      position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      font-size: 13px; padding: 8px 20px; border-radius: 20px;
      background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.15); opacity: 0; transition: opacity 0.3s; white-space: nowrap;
    }
    .status.show { opacity: 1; }
    .status.ok { color: #4ade80; border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.1); }
    .status.fail { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.1); }
    .status.info { color: #fbbf24; border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.1); }

    .hint { position: fixed; bottom: 24px; font-size: 11px; color: rgba(255,255,255,0.3); text-align: center; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="disc-container">
    <div class="disc" id="disc"><div class="disc-grooves"></div></div>
    <div class="disc-center"></div>
  </div>

  <div class="song-title">L！L！L！</div>
  <div class="song-artist">虹咲学园学园偶像同好会</div>

  <button class="play-btn" id="playBtn" onclick="startPlay()">
    <div class="pulse-ring"></div><div class="pulse-ring"></div>
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </button>

  <!-- 手动触发按钮（用于自动播放被阻止的情况） -->
  <div class="auto-hint" id="autoHint">
    如果网易云音乐没有自动启动，<br>请点击下方按钮
    <button onclick="startPlay()">▶ 手动播放</button>
  </div>

  <div class="status" id="status"></div>
  <div class="hint">📳 NFC 贴纸碰一碰自动播放<br>🎵 网易云音乐 · 支持所有安卓浏览器</div>

<script>
var SONG_ID = '1887056125';
var NETEASE_SCHEME = 'orpheus://song/' + SONG_ID;
var ANDROID_INTENT = 'intent://orpheus/song/' + SONG_ID + '#Intent;scheme=orpheus;package=com.netease.cloudmusic;end';
var WEB_URL = 'https://y.music.163.com/m/song?id=' + SONG_ID;

var isAndroid = /Android/i.test(navigator.userAgent);
var isChrome = /Chrome/i.test(navigator.userAgent) && !/Edge|Edg/i.test(navigator.userAgent);
var playing = false;
var launched = false;
var autoHintShown = false;
var disc = document.getElementById('disc');
var status = document.getElementById('status');
var autoHint = document.getElementById('autoHint');

function showStatus(msg, cls) {
  status.textContent = msg;
  status.className = 'status show ' + (cls || '');
}

function showAutoHint() {
  autoHintShown = true;
  autoHint.classList.add('show');
}

function startPlay() {
  if (playing) return;
  playing = true;
  launched = false;
  disc.classList.add('playing');
  showStatus('正在启动网易云音乐…', '');

  if (isAndroid) {
    // 尝试方案1：intent URL（Chrome 最可靠）
    window.location.href = ANDROID_INTENT;

    setTimeout(function() {
      if (!document.hidden && !launched) {
        launched = true;
        // 方案2：orpheus scheme（其他浏览器）
        window.location.href = NETEASE_SCHEME;
      }
    }, 1200);

    setTimeout(function() {
      if (!document.hidden && !launched) {
        launched = true;
        // 方案3：网页版
        showAutoHint();
        showStatus('跳转网页版…', 'fail');
        setTimeout(function() { window.location.href = WEB_URL; }, 1000);
      }
    }, 2500);

  } else {
    // iOS / 其他
    window.location.href = NETEASE_SCHEME;
    setTimeout(function() {
      if (!document.hidden) {
        window.location.href = WEB_URL;
      }
    }, 2000);
  }
}

// 检测 App 是否拉起成功（切后台 = 成功）
document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    launched = true;
    showStatus('🎉 网易云音乐已启动', 'ok');
    disc.classList.remove('playing');
  }
});

// Android：自动尝试（页面加载时立即执行）
if (isAndroid) {
  // 延迟一下，等页面完全就绪
  setTimeout(function() {
    // 某些浏览器会阻止自动跳转，显示按钮提示
    setTimeout(function() {
      if (!playing) {
        showAutoHint();
      }
    }, 3000);
  }, 500);
}
</script>
</body>
</html>
