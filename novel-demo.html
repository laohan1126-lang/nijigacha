<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大道之爭 · Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #050508; }

/* ========== 场景背景 ========== */
#scene {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 30%, #0d0a18 0%, #050508 70%);
  transition: opacity 1s ease;
}
#scene::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(180,40,40,.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(40,60,160,.08) 0%, transparent 50%);
}

/* 地面 */
#scene::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 35%;
  background: linear-gradient(to top, rgba(0,0,0,.6) 0%, transparent 100%);
}

/* ========== 角色层 ========== */
#char-layer { position: fixed; inset: 0; pointer-events: none; }

.char {
  position: absolute;
  bottom: 12%;
  height: 80%;
  transition: all .8s cubic-bezier(.4,0,.2,1);
  filter: drop-shadow(0 0 30px rgba(0,0,0,.8));
}
.char.hidden { opacity: 0; transform: translateY(30px) scale(.95); }
.char.left { left: 2%; }
.char.right { right: 2%; }
.char.center { left: 50%; transform: translateX(-50%); bottom: 8%; }
.char.center.visible { transform: translateX(-50%) scale(1.05); }
.char.dim { filter: brightness(.4) drop-shadow(0 0 20px rgba(0,0,0,.5)); }

/* 角色名标签 */
.char-label {
  position: absolute;
  bottom: -30px;
  left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,.7);
  font-size: 12px;
  letter-spacing: 3px;
  white-space: nowrap;
  text-shadow: 0 2px 8px rgba(0,0,0,.8);
}

/* 大道光环 */
.char-glow {
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  opacity: 0;
  transition: opacity .5s ease;
  pointer-events: none;
}
.char-glow.active { opacity: 1; animation: glow-spin 4s linear infinite; }
@keyframes glow-spin { to{transform:rotate(360deg)} }
.faqi-glow { background: conic-gradient(from 0deg, transparent, rgba(180,30,30,.4), transparent, rgba(180,30,30,.4), transparent); }
.rujia-glow { background: conic-gradient(from 180deg, transparent, rgba(200,180,60,.4), transparent, rgba(200,180,60,.4), transparent); }
.zhuti-glow { background: conic-gradient(from 90deg, transparent, rgba(60,120,200,.3), transparent, rgba(60,120,200,.3), transparent); }

/* ========== 对话框 ========== */
#dialogue-box {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  background: linear-gradient(to top, rgba(5,3,12,.97) 0%, rgba(5,3,12,.9) 80%, transparent 100%);
  padding: 20px 24px 28px;
  transform: translateY(100%);
  transition: transform .5s cubic-bezier(.4,0,.2,1);
}
#dialogue-box.visible { transform: translateY(0); }

#speaker-name {
  color: #c8a04a;
  font-size: 13px;
  letter-spacing: 4px;
  margin-bottom: 10px;
  text-shadow: 0 0 12px rgba(200,160,74,.5);
}
#speaker-name.faqi { color: #c04040; text-shadow: 0 0 12px rgba(192,64,64,.5); }
#speaker-name.rujia { color: #c8a04a; text-shadow: 0 0 12px rgba(200,160,74,.5); }
#speaker-name.zhuti { color: #5090d0; text-shadow: 0 0 12px rgba(80,144,208,.5); }
#speaker-name.narrator { color: rgba(255,255,255,.4); }

#dialogue-text {
  color: #e8e0d0;
  font-size: 16px;
  line-height: 1.9;
  min-height: 60px;
  letter-spacing: 1px;
}
#next-arrow {
  position: absolute;
  bottom: 12px; right: 24px;
  color: rgba(255,255,255,.3);
  font-size: 20px;
  animation: arrow-blink 1.2s ease-in-out infinite;
}
@keyframes arrow-blink { 0%,100%{opacity:.3} 50%{opacity:.8} }

/* ========== 选项 ========== */
#choices {
  position: fixed;
  bottom: 160px; left: 50%;
  transform: translateX(-50%);
  z-index: 110;
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 90%; max-width: 500px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .5s ease;
}
#choices.visible { opacity: 1; pointer-events: all; }

.choice-btn {
  background: rgba(10,8,20,.9);
  border: 1px solid rgba(200,160,74,.3);
  color: #c8a04a;
  padding: 14px 20px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  text-align: left;
  letter-spacing: 1px;
  transition: all .25s ease;
  backdrop-filter: blur(8px);
}
.choice-btn:hover, .choice-btn.selected {
  background: rgba(200,160,74,.15);
  border-color: rgba(200,160,74,.7);
  box-shadow: 0 0 20px rgba(200,160,74,.2);
  transform: translateX(4px);
}

/* ========== 大道之力爆发特效 ========== */
#burst {
  position: fixed; inset: 0;
  z-index: 200;
  pointer-events: none;
  opacity: 0;
}
#burst.active { animation: burst-flash .8s ease-out forwards; }
@keyframes burst-flash {
  0%{opacity:1;background:radial-gradient(ellipse at 50% 40%, rgba(200,160,74,.4) 0%, transparent 60%)}
  100%{opacity:0;background:transparent}
}

/* ========== 开始/标题页 ========== */
#title-screen {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 40%, #0a0618 0%, #050508 70%);
  z-index: 300;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 1s ease;
}
#title-screen.hidden { opacity: 0; pointer-events: none; }

.title-text {
  color: #c8a04a;
  font-size: 36px;
  letter-spacing: 12px;
  text-shadow: 0 0 40px rgba(200,160,74,.4), 0 0 80px rgba(200,160,74,.2);
  margin-bottom: 12px;
}
.title-sub {
  color: rgba(255,255,255,.3);
  font-size: 12px;
  letter-spacing: 6px;
  margin-bottom: 60px;
}
.start-btn {
  padding: 14px 48px;
  border: 1px solid rgba(200,160,74,.5);
  background: transparent;
  color: #c8a04a;
  font-size: 14px;
  letter-spacing: 4px;
  cursor: pointer;
  border-radius: 4px;
  transition: all .3s;
}
.start-btn:hover {
  background: rgba(200,160,74,.1);
  box-shadow: 0 0 30px rgba(200,160,74,.2);
}

/* ========== 提示 ========== */
#hint {
  position: fixed;
  top: 16px; left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,.2);
  font-size: 11px;
  letter-spacing: 2px;
  z-index: 150;
  text-align: center;
}
</style>
</head>
<body>

<!-- 标题页 -->
<div id="title-screen">
  <div class="title-text">大道之爭</div>
  <div class="title-sub">THE WAR OF DOCTRINES</div>
  <button class="start-btn" onclick="startGame()">進入遊戲</button>
</div>

<!-- 场景 -->
<div id="scene"></div>

<!-- 角色 -->
<div id="char-layer">
  <div class="char left hidden" id="char-shangchen">
    <div class="char-glow faqi-glow" id="glow-shangchen"></div>
    <img src="" id="img-shangchen" style="height:100%;object-fit:contain;" alt="">
    <div class="char-label">商臣 · 法家</div>
  </div>
  <div class="char right hidden" id="char-mengzi">
    <div class="char-glow rujia-glow" id="glow-mengzi"></div>
    <img src="" id="img-mengzi" style="height:100%;object-fit:contain;" alt="">
    <div class="char-label">孟軻 · 儒家</div>
  </div>
  <div class="char center hidden" id="char-zhuti">
    <div class="char-glow zhuti-glow" id="glow-zhuti"></div>
    <img src="" id="img-zhuti" style="height:100%;object-fit:contain;" alt="">
    <div class="char-label">你</div>
  </div>
</div>

<!-- 特效 -->
<div id="burst"></div>

<!-- 对话框 -->
<div id="dialogue-box">
  <div id="speaker-name">旁白</div>
  <div id="dialogue-text"></div>
  <div id="next-arrow">▼</div>
</div>

<!-- 选项 -->
<div id="choices"></div>

<!-- 提示 -->
<div id="hint">點擊畫面或滾動繼續</div>

<script>
// ====== 角色圖片（需要替換成實際路徑）======
const IMG = {
  shangchen: 'https://e204f62ef06b0d95-106-53-185-132.serveousercontent.com/shangchen.png',
  mengzi: 'https://e204f62ef06b0d95-106-53-185-132.serveousercontent.com/mengzi.png',
  zhuti: 'https://e204f62ef06b0d95-106-53-185-132.serveousercontent.com/protagonist.png'
};

// ====== 遊戲狀態 ======
const state = {
  faqi: 0,    // 法家好感
  rujia: 0,   // 儒家好感
  phase: 0,   // 當前段落
  locked: false
};

// ====== 劇本數據 ======
const script = [
  // === 序幕 ===
  { type: 'title', text: '秦王政十二年 · 咸陽咸宮' },
  { type: 'nar', text: '秦國大殿，七國使臣雲集。今日是秦王設下的「以言定策」——三個問題，三種回答，勝者得三城。' },
  { type: 'nar', text: '你，一位無派別的遊士，坐在大殿最末席。左右兩側，分別端坐著——' },
  { type: 'char-in', who: 'shangchen', pos: 'left' },
  { type: 'char-in', who: 'mengzi', pos: 'right' },
  { type: 'nar', text: '商臣，韓非子後裔，法家嫡傳，據說舌戰七國未嘗一敗。' },
  { type: 'nar', text: '孟軻，儒家飽學之儒，周遊列國而不得用，卻在此處與法家對坐。' },
  { type: 'speaker', name: '旁白', cls: 'narrator', text: '秦王高坐，聲如寒冰：「三個問題，請三位作答。第一問——」' },
  { type: 'speaker', name: '秦王', cls: 'narrator', text: '「天下大亂，病因何在？」' },

  // === 第一問 ===
  { type: 'speaker', name: '商臣', cls: 'faqi', text: '「天下大亂，病因唯有一字——弱。弱肉強食，此天道也。諸侯弱，故相征；人心弱，故作亂。治亂之道，在於以刑名立威，使民畏法而不敢犯。」', glow: 'shangchen' },
  { type: 'speaker', name: '孟軻', cls: 'rujia', text: '「不然。天下之亂，亂於失德。諸侯攻城略地，是因無仁政；人心不古，是因無教化。以力服人者，非心服也；以德服人者，斯四方來服。」', glow: 'mengzi' },
  { type: 'speaker', name: '秦王', cls: 'narrator', text: '「遊士，你以為如何？」' },
  { type: 'speaker', name: '你', cls: 'zhuti', text: '「……」', glow: 'zhuti' },

  // 選項
  { type: 'choice', options: [
    { text: '「我贊同法家。仁義說得再好聽，諸侯不聽。有刑名約束，方能定天下。」', faqi: +2, rujia: -1, next: 'a1' },
    { text: '「我贊同儒家。強秦以力統一，卻以何守？二世而亡者，前車之鑑。」', rujia: +2, faqi: -1, next: 'a2' },
    { text: '「敢問二位——諸侯所征者，何地？所教者，何民？若無民，何來天下？」', faqi: +1, rujia: +1, next: 'a3' }
  ]},

  // === A1 路徑 ===
  { type: 'branch', id: 'a1' },
  { type: 'speaker', name: '商臣', cls: 'faqi', text: '「善。你見過山火嗎？林中枯木積久，一火焚之，方有新芽破土。我之刑法，非殘忍，乃是新秩序的播種。」', glow: 'shangchen' },
  { type: 'speaker', name: '孟軻', cls: 'rujia', text: '「以草木喻人，未免輕賤。民非枯木，乃有血有肉之人。以刑驅之，所得者非心，乃恐懼之奴。」', glow: 'mengzi' },
  { type: 'speaker', name: '秦王', cls: 'narrator', text: '「第二問——統一天下，當用何道？」' },
  { type: 'speaker', name: '商臣', cls: 'faqi', text: '「霸道。以戰為和，以刑為教。秦之鐵騎，便是天下最好的道理。」', glow: 'shangchen' },
  { type: 'speaker', name: '孟軻', cls: 'rujia', text: '「王道。以德為政，以民為本。域民不以封疆之界，威天下不以兵革之利。」', glow: 'mengzi' },
  { type: 'choice', options: [
    { text: '「霸道一時爽，王道萬世昌。短長之論，何必急於一時？」', rujia: +2, faqi: +1, next: 'end_a' },
    { text: '「秦之鐵騎，諸侯擋不住。此乃實力，非道理。」', faqi: +2, rujia: -2, next: 'end_a' }
  ]},

  // === A2 路徑 ===
  { type: 'branch', id: 'a2' },
  { type: 'speaker', name: '孟軻', cls: 'rujia', text: '「善。民心如水，水能載舟，亦能覆舟。得民心者，得天下。」', glow: 'mengzi' },
  { type: 'speaker', name: '商臣', cls: 'faqi', text: '「可笑。民如水，卻不知水能決堤。沒有刑名約束，民變不過一聲吶喊。」', glow: 'shangchen' },
  { type: 'speaker', name: '秦王', cls: 'narrator', text: '「第二問——統一天下，當用何道？」' },
  { type: 'choice', options: [
    { text: '「以力統一，以德守成——霸道開路，王道收官。」', rujia: +2, faqi: +1, next: 'end_b' },
    { text: '「秦王雄才大略，何必問我？我只想靜觀其變。」', faqi: +1, rujia: +1, next: 'end_b' }
  ]},

  // === A3 路徑 ===
  { type: 'branch', id: 'a3' },
  { type: 'speaker', name: '商臣', cls: 'faqi', text: '「問得好。但民之於國，如水之於渠。渠正則水清，渠斜則水濁。刑名者，渠也。」', glow: 'shangchen' },
  { type: 'speaker', name: '孟軻', cls: 'rujia', text: '「若民心本善，何須渠來正之？刑名是堵，水善下而攻，堵之不竭。」', glow: 'mengzi' },
  { type: 'speaker', name: '秦王', cls: 'narrator', text: '「有點意思。第二問——統一天下，誰來統？」' },
  { type: 'choice', options: [
    { text: '「有道則見，無道則隱。天命所歸，何必問我是誰。」', rujia: +2, faqi: 0, next: 'end_c' },
    { text: '「秦有此力，秦便統。歷史由勝者書寫。」', faqi: +2, rujia: -1, next: 'end_c' }
  ]},

  // === 結局 ===
  { type: 'branch', id: 'end_a' },
  { type: 'nar', text: '秦王大笑，起身離席。「法家之言，朕愛聽。但遊士之答，亦有意味。」' },
  { type: 'nar', text: '你被任為一小吏，從此捲入秦國朝堂的漩渦之中——' },
  { type: 'nar', text: '法家與儒家的較量，才剛剛開始。' },
  { type: 'end', text: '【結局：灰色地帶】', sub: '你在法律與道德之間找到了自己的位置。' },

  { type: 'branch', id: 'end_b' },
  { type: 'nar', text: '秦王沉吟良久，起身向外走去。經過你身側時，他忽然停下。' },
  { type: 'nar', text: '「你叫什麼名字？」' },
  { type: 'nar', text: '「……」' },
  { type: 'nar', text: '這是你第一次被秦王正眼相看。你知道，一切從此不同了。' },
  { type: 'end', text: '【結局：儒法並存】', sub: '你試圖在理想與現實之間找到橋樑，秦王的注視改變了你的命運。' },

  { type: 'branch', id: 'end_c' },
  { type: 'nar', text: '大殿忽然安靜。' },
  { type: 'nar', text: '商臣皺眉，孟軻微笑，秦王注視著你——這個無派別的遊士，說出了他們都沒有想到的問題。' },
  { type: 'nar', text: '「有趣。」秦王起身，「此事容后再議。」' },
  { type: 'nar', text: '你轉身離開大殿，卻知道——你的話，已經在秦王心裡種下了什麼。' },
  { type: 'end', text: '【結局：天道觀察者】', sub: '你不屬於任何一派，卻讓所有派別都開始思考。' },
];

// ====== DOM 元素 ======
const $title = document.getElementById('title-screen');
const $dialogueBox = document.getElementById('dialogue-box');
const $speakerName = document.getElementById('speaker-name');
const $dialogueText = document.getElementById('dialogue-text');
const $choices = document.getElementById('choices');
const $burst = document.getElementById('burst');
const $hint = document.getElementById('hint');

// ====== 打字機效果 ======
let typeTimer = null;
let fullText = '';
let charIndex = 0;

function typeText(text, callback) {
  clearInterval(typeTimer);
  fullText = text;
  charIndex = 0;
  $dialogueText.textContent = '';
  $dialogueBox.classList.add('visible');

  typeTimer = setInterval(() => {
    if (charIndex < fullText.length) {
      $dialogueText.textContent += fullText[charIndex];
      charIndex++;
    } else {
      clearInterval(typeTimer);
      if (callback) callback();
    }
  }, 35);
}

function skipText() {
  clearInterval(typeTimer);
  $dialogueText.textContent = fullText;
  fullText = '';
}

// ====== 角色控制 ======
function showChar(who, pos) {
  const el = document.getElementById('char-' + who);
  el.querySelector('img').src = IMG[who];
  el.className = 'char ' + pos;
}

function hideChar(who) {
  document.getElementById('char-' + who).classList.add('hidden');
  document.getElementById('char-' + who).classList.remove('visible');
}

function activateGlow(who) {
  if (!who) return;
  const glow = document.getElementById('glow-' + who);
  if (glow) {
    glow.classList.add('active');
    setTimeout(() => glow.classList.remove('active'), 2000);
  }
}

function burstEffect() {
  $burst.classList.remove('active');
  void $burst.offsetWidth;
  $burst.classList.add('active');
  setTimeout(() => $burst.classList.remove('active'), 800);
}

// ====== 選項 ======
function showChoices(options) {
  $choices.innerHTML = '';
  $choices.classList.add('visible');
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = opt.text;
    btn.onclick = () => choose(opt);
    $choices.appendChild(btn);
  });
}

function hideChoices() {
  $choices.classList.remove('visible');
  $choices.innerHTML = '';
}

function choose(opt) {
  if (state.locked) return;
  state.locked = true;
  if (opt.faqi) state.faqi += opt.faqi;
  if (opt.rujia) state.rujia += opt.rujia;
  hideChoices();
  state.locked = false;
  goToBranch(opt.next);
}

// ====== 場景控制 ======
function goToBranch(branchId) {
  const idx = script.findIndex(s => s.type === 'branch' && s.id === branchId);
  if (idx >= 0) playScene(idx + 1);
  else playNext();
}

// ====== 播放段落 ======
function playScene(idx) {
  if (idx >= script.length) { showEnding(); return; }
  const scene = script[idx];

  switch(scene.type) {
    case 'title':
      fadeScene(() => {
        $dialogueBox.classList.remove('visible');
        playScene(idx + 1);
      });
      break;

    case 'nar':
      typeText(scene.text, () => {
        $hint.style.display = 'block';
        state.currentIdx = idx;
        state.waiting = true;
      });
      $speakerName.textContent = '　';
      $speakerName.className = 'narrator';
      $hint.style.display = 'none';
      break;

    case 'speaker':
      $speakerName.textContent = scene.name;
      $speakerName.className = scene.cls;
      if (scene.glow) activateGlow(scene.glow);
      typeText(scene.text, () => {
        $hint.style.display = 'block';
        state.currentIdx = idx;
        state.waiting = true;
      });
      $hint.style.display = 'none';
      break;

    case 'char-in':
      showChar(scene.who, scene.pos);
      playScene(idx + 1);
      break;

    case 'choice':
      state.waiting = false;
      $hint.style.display = 'none';
      showChoices(scene.options);
      break;

    case 'branch':
      playScene(idx + 1);
      break;

    case 'end':
      showEnding(scene.text, scene.sub);
      break;
  }
}

function playNext() { playScene(state.currentIdx + 1); }
function playSceneP(idx) { playScene(idx); }

// ====== 過場 ======
function fadeScene(cb) {
  document.getElementById('scene').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('scene').style.opacity = '1';
    if (cb) cb();
  }, 1000);
}

// ====== 結局 ======
function showEnding(title, sub) {
  $dialogueBox.classList.remove('visible');
  $choices.classList.remove('visible');

  const endScreen = document.createElement('div');
  endScreen.style.cssText = 'position:fixed;inset:0;z-index:400;background:rgba(5,3,12,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#c8a04a;animation:fadeIn 1.5s ease forwards;';
  endScreen.innerHTML = `
    <div style="font-size:28px;letter-spacing:8px;margin-bottom:16px;text-shadow:0 0 30px rgba(200,160,74,.5)">${title}</div>
    <div style="color:rgba(255,255,255,.4);font-size:13px;letter-spacing:2px;margin-bottom:40px">${sub || ''}</div>
    <div style="color:rgba(255,255,255,.2);font-size:12px;letter-spacing:3px">FAQI ${state.faqi >= 0 ? '+' : ''}${state.faqi}　RUJIA ${state.rujia >= 0 ? '+' : ''}${state.rujia}</div>
    <button onclick="location.reload()" style="margin-top:40px;padding:12px 36px;border:1px solid rgba(200,160,74,.4);background:transparent;color:#c8a04a;font-size:13px;letter-spacing:3px;cursor:pointer;border-radius:4px">重玩</button>
  `;
  document.body.appendChild(endScreen);
}

// ====== 遊戲開始 ======
function startGame() {
  $title.classList.add('hidden');
  setTimeout(() => {
    $title.style.display = 'none';
    playScene(0);
  }, 1000);
}

// ====== 點擊控制 ======
let clickCount = 0;
document.addEventListener('click', (e) => {
  if (e.target.closest('#choices') || e.target.closest('.start-btn') || e.target.closest('button')) return;
  if ($title.style.display !== 'none' && !$title.classList.contains('hidden')) return;

  if (fullText) {
    skipText();
  } else if (state.waiting) {
    state.waiting = false;
    $hint.style.display = 'none';
    playNext();
  }
});

// ====== 初始化 ======
state.currentIdx = 0;
state.waiting = false;
</script>
</body>
</html>
