<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大道之爭</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050508; min-height: 100vh; font-family: system-ui, sans-serif; overflow: hidden; }
#scene { position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 30%, #0d0a18 0%, #050508 70%); }
#scene::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 30%; background: linear-gradient(to top, rgba(0,0,0,.5) 0%, transparent 100%); }
#chars { position: fixed; inset: 0; z-index: 5; pointer-events: none; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 5%; bottom: 8%; }
.char { height: 70%; opacity: 0; transition: opacity .5s; }
.char.on { opacity: 1; }
.char img { height: 100%; width: auto; }
#glow { position: fixed; inset: 0; z-index: 4; pointer-events: none; opacity: 0; transition: opacity .4s; }
#glow.faqi { background: radial-gradient(ellipse at 25% 60%, rgba(180,40,40,.3) 0%, transparent 55%); }
#glow.rujia { background: radial-gradient(ellipse at 75% 60%, rgba(200,160,60,.3) 0%, transparent 55%); }
#glow.active { opacity: 1; }
#dlg { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: linear-gradient(to top, rgba(5,3,12,.98) 0%, rgba(5,3,12,.85) 85%, transparent 100%); padding: 18px 24px 36px; transform: translateY(100%); transition: transform .35s ease; }
#dlg.on { transform: translateY(0); }
#speaker { color: #c8a04a; font-size: 12px; letter-spacing: 3px; margin-bottom: 8px; }
#speaker.faqi { color: #c04040; }
#speaker.rujia { color: #c8a04a; }
#speaker.narrator { color: rgba(255,255,255,.35); }
#speaker.zhuti { color: #5090d0; }
#text { color: #e8e0d0; font-size: 15px; line-height: 1.85; min-height: 50px; }
#hint { position: fixed; bottom: 110px; right: 18px; color: rgba(255,255,255,.22); font-size: 10px; letter-spacing: 2px; z-index: 101; }
#hint.off { display: none; }
#cbox { position: fixed; bottom: 160px; left: 50%; transform: translateX(-50%); z-index: 110; display: flex; flex-direction: column; gap: 8px; width: 90%; max-width: 500px; opacity: 0; pointer-events: none; transition: opacity .3s; }
#cbox.on { opacity: 1; pointer-events: all; }
.btn { background: rgba(8,6,16,.97); border: 1px solid rgba(200,160,74,.35); color: #c8a04a; padding: 13px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; text-align: left; transition: all .2s; letter-spacing: .5px; }
.btn:active { background: rgba(200,160,74,.12); border-color: rgba(200,160,74,.7); }
#title { position: fixed; inset: 0; z-index: 300; background: radial-gradient(ellipse at 50% 40%, #0a0618 0%, #050508 70%); display: flex; flex-direction: column; align-items: center; justify-content: center; }
#title.off { opacity: 0; pointer-events: none; transition: opacity .8s; }
#title h1 { color: #c8a04a; font-size: 30px; letter-spacing: 10px; text-shadow: 0 0 40px rgba(200,160,74,.4); margin-bottom: 8px; }
#title p { color: rgba(255,255,255,.2); font-size: 10px; letter-spacing: 5px; margin-bottom: 48px; }
#start { padding: 12px 42px; border: 1px solid rgba(200,160,74,.4); background: transparent; color: #c8a04a; font-size: 13px; letter-spacing: 4px; cursor: pointer; border-radius: 3px; }
#start:active { background: rgba(200,160,74,.1); }
#end { position: fixed; inset: 0; z-index: 400; background: rgba(5,3,12,.97); display: none; flex-direction: column; align-items: center; justify-content: center; }
#end.on { display: flex; }
#end h2 { color: #c8a04a; font-size: 20px; letter-spacing: 5px; margin-bottom: 10px; }
#end p { color: rgba(255,255,255,.3); font-size: 12px; letter-spacing: 2px; margin-bottom: 8px; text-align: center; padding: 0 20px; }
#end div { color: rgba(255,255,255,.18); font-size: 10px; letter-spacing: 3px; margin: 24px 0 30px; }
#replay { padding: 11px 32px; border: 1px solid rgba(200,160,74,.4); background: transparent; color: #c8a04a; font-size: 12px; letter-spacing: 3px; cursor: pointer; border-radius: 3px; }
</style>
</head>
<body>

<div id="title">
  <h1>大道之爭</h1>
  <p>THE WAR OF DOCTRINES</p>
  <button id="start" onclick="begin()">進入遊戲</button>
</div>

<div id="scene"></div>
<div id="glow"></div>

<div id="chars">
  <div class="char" id="c0"><img id="i0" src=""></div>
  <div class="char" id="c1"><img id="i1" src=""></div>
  <div class="char" id="c2"><img id="i2" src=""></div>
</div>

<div id="dlg">
  <div id="speaker"></div>
  <div id="text"></div>
</div>
<div id="hint">點擊繼續</div>
<div id="cbox"></div>

<div id="end">
  <h2 id="eTitle"></h2>
  <p id="eSub"></p>
  <div id="eStats"></div>
  <button id="replay" onclick="location.reload()">重玩</button>
</div>

<script>
const BASE = 'https://16df4b2f55fe6953-106-53-185-132.serveousercontent.com';
const I = [BASE+'/shangchen.jpg', BASE+'/mengzi.jpg', BASE+'/protagonist.jpg'];
I.forEach((u,i) => { document.getElementById('i'+i).src = u; });

let scene = 0, typing = false, faqi = 0, rujia = 0;
const $sp = document.getElementById('speaker');
const $tx = document.getElementById('text');
const $dlg = document.getElementById('dlg');
const $hint = document.getElementById('hint');
const $cbox = document.getElementById('cbox');
const $glow = document.getElementById('glow');
const scenes = [
  { t:'n', s:'旁白', c:'narrator', m:'秦王政十二年 · 咸陽咸宮' },
  { t:'n', s:'旁白', c:'narrator', m:'秦國大殿，七國使臣雲集。今日是秦王設下的「以言定策」——三個問題，三種回答，勝者得三城。' },
  { t:'n', s:'旁白', c:'narrator', m:'你，一位無派別的遊士，坐在大殿最末席。左右兩側，分別端坐著——' },
  { t:'c', who:0 },
  { t:'n', s:'旁白', c:'narrator', m:'商臣，韓非子後裔，法家嫡傳，據說舌戰七國未嘗一敗。' },
  { t:'c', who:1 },
  { t:'n', s:'旁白', c:'narrator', m:'孟軻，儒家飽學之儒，周遊列國而不得用，卻在此處與法家對坐。' },
  { t:'n', s:'旁白', c:'narrator', m:'秦王高坐，聲如寒冰：「三個問題，請三位作答。第一問——」' },
  { t:'n', s:'秦王', c:'narrator', m:'「天下大亂，病因何在？」' },
  { t:'s', s:'商臣', c:'faqi', m:'「天下大亂，病因唯有一字——弱。弱肉強食，此天道也。諸侯弱，故相征；人心弱，故作亂。治亂之道，在於以刑名立威，使民畏法而不敢犯。」', g:0 },
  { t:'s', s:'孟軻', c:'rujia', m:'「不然。天下之亂，亂於失德。諸侯攻城略地，是因無仁政；人心不古，是因無教化。以力服人者，非心服也；以德服人者，斯四方來服。」', g:1 },
  { t:'s', s:'秦王', c:'narrator', m:'「遊士，你以為如何？」' },
  { t:'s', s:'你', c:'zhuti', m:'「……」（請做出你的選擇）' },
  { t:'x', o:[
    { m:'「我贊同法家。仁義說得再好聽，諸侯不聽。有刑名約束，方能定天下。」', f:2,r:-1,n:100 },
    { m:'「我贊同儒家。強秦以力統一，卻以何守？二世而亡者，前車之鑑。」', f:-1,r:2,n:200 },
    { m:'「敢問二位——諸侯所征者，何地？若無民，何來天下？」', f:1,r:1,n:300 }
  ]},
  // 100
  { t:'l', id:100 },
  { t:'s', s:'商臣', c:'faqi', m:'「善。你見過山火嗎？林中枯木積久，一火焚之，方有新芽破土。」', g:0 },
  { t:'s', s:'孟軻', c:'rujia', m:'「以草木喻人，未免輕賤。民非枯木，乃有血有肉之人。」', g:1 },
  { t:'s', s:'秦王', c:'narrator', m:'「第二問——統一天下，當用何道？」' },
  { t:'x', o:[
    { m:'「霸道一時爽，王道萬世昌。短長之論，何必急於一時？」', f:1,r:2,n:101 },
    { m:'「秦之鐵騎，諸侯擋不住。此乃實力，非道理。」', f:2,r:-2,n:101 }
  ]},
  // 200
  { t:'l', id:200 },
  { t:'s', s:'孟軻', c:'rujia', m:'「善。民心如水，水能載舟，亦能覆舟。得民心者，得天下。」', g:1 },
  { t:'s', s:'商臣', c:'faqi', m:'「可笑。民如水，卻不知水能決堤。沒有刑名約束，民變不過一聲吶喊。」', g:0 },
  { t:'s', s:'秦王', c:'narrator', m:'「第二問——統一天下，當用何道？」' },
  { t:'x', o:[
    { m:'「以力統一，以德守成——霸道開路，王道收官。」', f:1,r:2,n:201 },
    { m:'「秦王雄才大略，何必問我？我只想靜觀其變。」', f:1,r:1,n:201 }
  ]},
  // 300
  { t:'l', id:300 },
  { t:'s', s:'商臣', c:'faqi', m:'「問得好。但民之於國，如水之於渠。渠正則水清，渠斜則水濁。刑名者，渠也。」', g:0 },
  { t:'s', s:'孟軻', c:'rujia', m:'「若民心本善，何須渠來正之？刑名是堵，水善下而攻，堵之不竭。」', g:1 },
  { t:'s', s:'秦王', c:'narrator', m:'「有點意思。第二問——誰來統一天下？」' },
  { t:'x', o:[
    { m:'「有道則見，無道則隱。天命所歸，何必問我是誰。」', f:0,r:2,n:301 },
    { m:'「秦有此力，秦便統。歷史由勝者書寫。」', f:2,r:-1,n:301 }
  ]},
  // 101
  { t:'l', id:101 },
  { t:'n', s:'旁白', c:'narrator', m:'秦王大笑，起身離席。「法家之言，朕愛聽。但遊士之答，亦有意味。」' },
  { t:'n', s:'旁白', c:'narrator', m:'你被任為一小吏，從此捲入秦國朝堂的漩渦之中——' },
  { t:'e', s:'【結局：灰色地帶】', sub:'你在法律與道德之間找到了自己的位置。' },
  // 201
  { t:'l', id:201 },
  { t:'n', s:'旁白', c:'narrator', m:'秦王沉吟良久，起身向外走去。經過你身側時，他忽然停下。' },
  { t:'n', s:'旁白', c:'narrator', m:'「你叫什麼名字？」' },
  { t:'n', s:'旁白', c:'narrator', m:'……' },
  { t:'n', s:'旁白', c:'narrator', m:'這是你第一次被秦王正眼相看。你知道，一切從此不同了。' },
  { t:'e', s:'【結局：儒法並存】', sub:'你試圖在理想與現實之間找到橋樑，秦王的注視改變了你的命運。' },
  // 301
  { t:'l', id:301 },
  { t:'n', s:'旁白', c:'narrator', m:'大殿忽然安靜。商臣皺眉，孟軻微笑，秦王注視著你——這個無派別的遊士，說出了他們都沒有想到的問題。' },
  { t:'n', s:'旁白', c:'narrator', m:'「有趣。」秦王起身，「此事容后再議。」' },
  { t:'n', s:'旁白', c:'narrator', m:'你轉身離開大殿，卻知道——你的話，已經在秦王心裡種下了什麼。' },
  { t:'e', s:'【結局：天道觀察者】', sub:'你不屬於任何一派，卻讓所有派別都開始思考。' },
];

function showChars(on) { [0,1,2].forEach(i => document.getElementById('c'+i).classList.toggle('on', on && i===on)); }

let typeTimer = null;
function typeText(txt, cb) {
  clearInterval(typeTimer);
  $tx.textContent = ''; typing = true; $hint.classList.add('off');
  let i = 0;
  typeTimer = setInterval(() => {
    if (i < txt.length) $tx.textContent += txt[i++];
    else { clearInterval(typeTimer); typing = false; $hint.classList.remove('off'); if(cb) cb(); }
  }, 35);
}

function showChoices(opts) {
  $cbox.innerHTML = '';
  opts.forEach(o => {
    const b = document.createElement('button');
    b.className = 'btn'; b.textContent = o.m;
    b.onclick = () => {
      if(o.f) faqi += o.f;
      if(o.r) rujia += o.r;
      $cbox.classList.remove('on');
      scene = scenes.findIndex((s,i) => i > scene && s.t === 'l' && s.id === o.n);
      if (scene < 0) scene = scenes.length;
      setTimeout(play, 200);
    };
    $cbox.appendChild(b);
  });
  $cbox.classList.add('on');
}

function play() {
  if (scene >= scenes.length) return;
  const s = scenes[scene];

  if (s.t === 'n') {
    $sp.textContent = s.s; $sp.className = s.c;
    $dlg.classList.add('on'); typeText(s.m);
  } else if (s.t === 's') {
    $sp.textContent = s.s; $sp.className = s.c;
    if (s.g !== undefined) {
      $glow.className = (s.g === 0 ? 'faqi' : 'rujia') + ' active';
      setTimeout(() => $glow.className = (s.g === 0 ? 'faqi' : 'rujia'), 1500);
    }
    $dlg.classList.add('on'); typeText(s.m);
  } else if (s.t === 'c') {
    showChars(s.who + 1); scene++; play(); return;
  } else if (s.t === 'x') {
    $dlg.classList.remove('on');
    setTimeout(() => showChoices(s.o), 200);
    return;
  } else if (s.t === 'e') {
    $dlg.classList.remove('on');
    document.getElementById('eTitle').textContent = s.s;
    document.getElementById('eSub').textContent = s.sub || '';
    document.getElementById('eStats').textContent = '法家 ' + (faqi>=0?'+':'') + faqi + '　 儒家 ' + (rujia>=0?'+':'') + rujia;
    document.getElementById('end').classList.add('on');
    return;
  } else if (s.t === 'l') {
    scene++; play(); return;
  }
}

function next() {
  if (scene >= scenes.length) return;
  const s = scenes[scene];
  if (s.t === 'x' || s.t === 'e' || s.t === 'l') return;
  if (typing) { clearInterval(typeTimer); $tx.textContent = s.m || scenes[scene].m; typing = false; $hint.classList.remove('off'); return; }
  scene++; play();
}

document.addEventListener('click', (e) => {
  if (e.target.closest('#start') || e.target.closest('#replay')) return;
  if (e.target.closest('#cbox')) return;
  if (!document.getElementById('title').classList.contains('off')) return;
  next();
});

function begin() {
  document.getElementById('title').classList.add('off');
  setTimeout(() => { document.getElementById('title').style.display = 'none'; }, 800);
  setTimeout(play, 500);
}
</script>
</body>
</html>
