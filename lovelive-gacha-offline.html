function startDraw(){
  var name=document.getElementById('nameInput').value.trim()||'神秘人';
  if(name.length<2){alert('请输入至少2个字的名字~');return;}
  var char=CHARACTERS[Math.floor(Math.random()*CHARACTERS.length)];
  document.getElementById('stepInput').classList.remove('active');
  document.getElementById('stepResult').classList.add('active');
  document.getElementById('resultUsername').textContent=name+' 抽到了！';
  var rarityTexts={S:'🎉 S级 · 神级角色',A:'✨ A级 · 超稀有',B:'👍 B级 · 很不错',C:'💚 C级 · 也很棒'};
  var rarity=char.rarity;
  var banner=document.getElementById('rarityBanner');
  banner.className='rarity-banner rarity-'+rarity;
  banner.textContent=rarityTexts[rarity];
  var card=document.getElementById('mainCard');
  card.className='main-card card-animate rarity-'+rarity;
  document.getElementById('avatarImg').src=char.img;
  document.getElementById('charName').textContent=char.name;
  document.getElementById('charSub').textContent=char.sub;
  var attrHtml='';
  char.attr.forEach(function(a){attrHtml+='<span class="attr-tag" style="background:'+a[0]+';color:#fff">'+a[1]+'</span>';});
  document.getElementById('charAttr').innerHTML=attrHtml;
  document.getElementById('charCv').textContent=(char.cv?'  '+char.cv:'');
  document.getElementById('charSolo').innerHTML=char.solo||'';
  document.getElementById('charMv').innerHTML=char.mv||'';
  document.getElementById('bioText').textContent=char.desc;
  document.getElementById('charQuote').textContent=char.quote;
  document.getElementById('funFactText').textContent=char.funFact;
  var labels={vocal:'歌唱',dance:'舞蹈',visual:'视觉',charm:'魅力'};
  var statColors={S:'stat-S',A:'stat-A',B:'stat-B',C:'stat-C'};
  var statsHtml='';
  Object.keys(char.stats).forEach(function(key){statsHtml+='<div class="stat-row"><span class="stat-label">'+labels[key]+'</span><div class="stat-bar-bg"><div class="stat-bar '+statColors[rarity]+'" style="width:0%"></div></div></div>';});
  document.getElementById('statsArea').innerHTML=statsHtml;
  var inner=document.getElementById('mainCard');
  inner.classList.remove('card-animate');
  void inner.offsetWidth;
  inner.classList.add('card-animate');
  setTimeout(function(){var bars=document.querySelectorAll('.stat-bar');var idx=0;Object.keys(char.stats).forEach(function(key){if(bars[idx])bars[idx].style.width=char.stats[key]+'%';idx++;});},300);
}
function resetDraw(){
  document.getElementById('stepResult').classList.remove('active');
  document.getElementById('stepInput').classList.add('active');
  document.getElementById('nameInput').value='';
  document.getElementById('nameInput').focus();
}
document.getElementById('nameInput').addEventListener('keyup',function(e){ if(e.key==='Enter') startDraw(); });
var musicOn=false; function toggleMusic(){ var bgm=document.getElementById('bgm'); var btn=document.getElementById('musicBtn'); if(musicOn){ bgm.pause(); btn.textContent='🔇'; btn.classList.remove('playing'); musicOn=false; } else { bgm.play().catch(()=>{}); btn.textContent='🎵'; btn.classList.add('playing'); musicOn=true; } }
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(()=>{}); }
