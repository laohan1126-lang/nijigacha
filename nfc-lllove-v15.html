<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Circle of Love - L！L！L！</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: #000008;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* ========== 开场动画 ========== */
    .intro {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #000008;
      transition: opacity 1.5s ease;
    }
    .intro.fade-out { opacity: 0; pointer-events: none; }
    .intro.hidden { display: none; }

    /* 演唱会荧光棒海洋 */
    .crowd-bg {
      position: absolute; width: 100%; height: 100%;
      background: linear-gradient(180deg, #0a0518 0%, #050010 60%);
    }
    .glowstick {
      position: absolute;
      border-radius: 50%;
      animation: glowstick-flicker var(--dur) ease-in-out infinite;
    }
    @keyframes glowstick-flicker {
      0%, 100% { opacity: var(--base); transform: scale(1); }
      50% { opacity: var(--peak); transform: scale(1.15); }
    }

    /* 舞台光柱（白色主光柱） */
    .stage-beam {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 100%;
      background: linear-gradient(to top, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.4) 30%, transparent 100%);
      filter: blur(8px);
      animation: beam-pulse 2s ease-in-out infinite;
    }
    @keyframes beam-pulse {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 1; }
    }

    /* 彩色侧光束 */
    .side-beam {
      position: absolute;
      bottom: 0;
      width: 120px;
      height: 100%;
      opacity: 0.4;
      filter: blur(15px);
    }
    .side-beam.blue {
      left: 0;
      background: linear-gradient(to top right, rgba(80,150,255,0.8) 0%, transparent 70%);
    }
    .side-beam.orange {
      right: 0;
      background: linear-gradient(to top left, rgba(255,150,50,0.8) 0%, transparent 70%);
    }

    /* 顶部焰火 */
    .firework {
      position: absolute;
      top: 0;
      border-radius: 50%;
      animation: firework-explode 1.5s ease-out forwards;
    }
    @keyframes firework-explode {
      0% { transform: scale(0); opacity: 1; }
      50% { opacity: 1; }
      100% { transform: scale(1); opacity: 0; }
    }

    /* 粉色心形玫瑰（用CSS绘制） */
    .heart-rose {
      position: relative;
      width: 200px;
      height: 200px;
      animation: heart-beat 1.5s ease-in-out infinite;
    }
    @keyframes heart-beat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.07); }
      30% { transform: scale(1); }
      45% { transform: scale(1.05); }
      60% { transform: scale(1); }
    }
    .heart {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 50% 30%, #ff6090 0%, #e03050 50%, #a01030 100%);
      filter: drop-shadow(0 0 30px rgba(255,60,100,0.8)) drop-shadow(0 0 60px rgba(255,40,80,0.5));
      clip-path: path('M100,170 C20,100 -10,50 50,20 C80,5 100,30 100,30 C100,30 120,5 150,20 C210,50 180,100 100,170 Z');
    }
    .heart-shine {
      position: absolute;
      top: 20%; left: 25%;
      width: 30%; height: 20%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.6), transparent);
      border-radius: 50%;
      transform: rotate(-30deg);
    }

    /* CIRCLE OF LOVE 渐变大字 */
    .col-title {
      position: absolute;
      font-size: clamp(24px, 6vw, 42px);
      font-weight: 800;
      letter-spacing: 3px;
      background: linear-gradient(90deg, #ff7090, #c080e0, #6080ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(200,120,220,0.7));
      text-align: center;
      z-index: 10;
    }

    /* 副标题 */
    .sub-title {
      position: absolute;
      font-size: clamp(10px, 2.5vw, 14px);
      letter-spacing: 6px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      z-index: 10;
    }

    /* 顶部LOVELIVE文字 */
    .top-banner {
      position: absolute;
      top: 20px;
      font-size: 10px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      z-index: 20;
    }

    /* 底部 "UNIVERSITY" */
    .bottom-univ {
      position: absolute;
      bottom: 15px;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    /* ========== 主内容 ========== */
    .main {
      display: none;
      opacity: 0;
      transition: opacity 1s ease;
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }
    .main.show { display: block; opacity: 1; }

    .bg-main {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(20,10,40,0.9) 0%, #000008 70%);
    }
    .content {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 24px;
    }
    .album-art {
      width: 120px; height: 120px; border-radius: 16px; object-fit: cover;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08), 0 0 40px rgba(200,80,150,0.15);
      flex-shrink: 0;
      animation: album-in 0.8s cubic-bezier(0.4,0,0.2,1) 0.1s both;
    }
    @keyframes album-in {
      0% { transform: scale(0.85) translateX(-20px); opacity: 0; }
      100% { transform: scale(1) translateX(0); opacity: 1; }
    }
    .info { flex: 1; animation: album-in 0.8s ease 0.2s both; }
    .song-title { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; color: #fff; }
    .song-subtitle { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 18px; letter-spacing: 0.5px; }
    .play-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 28px; border-radius: 50px;
      background: linear-gradient(90deg, #e03060, #c02050);
      border: none; cursor: pointer;
      box-shadow: 0 6px 24px rgba(200,30,60,0.4);
      transition: all 0.2s ease;
      font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 2px; align-self: flex-start;
    }
    .play-btn:active { transform: scale(0.96); }
    .play-btn svg { width: 16px; height: 16px; fill: #fff; }
    .tap-hint { margin-top: 10px; font-size: 11px; color: rgba(255,255,255,0.25); }
    .status { margin-top: 14px; font-size: 12px; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); opacity: 0; transition: opacity 0.3s; text-align: center; }
    .status.show { opacity: 1; }
    .status.ok { color: #4ade80; border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.08); }
    .status.fail { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.08); }
    .fallback-btn { display: none; margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.4); background: none; border: none; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; align-self: flex-start; }
    .fallback-btn.show { display: block; }
    .nfc-hint { position: fixed; bottom: 24px; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <!-- ========== 开场动画 ========== -->
  <div class="intro" id="intro">
    <!-- 演唱会背景 -->
    <div class="crowd-bg" id="crowd"></div>

    <!-- 舞台光柱 -->
    <div class="stage-beam"></div>
    <div class="side-beam blue"></div>
    <div class="side-beam orange"></div>

    <!-- 焰火 -->
    <div id="fireworks"></div>

    <!-- 心形玫瑰 -->
    <div class="heart-rose" style="top:calc(50% - 160px);">
      <div class="heart"></div>
      <div class="heart-shine"></div>
    </div>

    <!-- CIRCLE OF LOVE -->
    <div class="col-title" style="top:calc(50% + 50px);">CIRCLE OF LOVE</div>
    <div class="sub-title" style="top:calc(50% + 100px);">L！L！L！ · 爱的回环</div>

    <!-- 顶部文字 -->
    <div class="top-banner">虹咲学園 · 宮下愛</div>
    <div class="bottom-univ">University</div>
  </div>

  <!-- ========== 主内容 ========== -->
  <div class="bg-main"></div>
  <div class="main" id="main">
    <div class="content">
      <img class="album-art" src="https://4ad2f463258bc8e2-106-53-185-132.serveousercontent.com/album-cover.jpg" alt="album art">
      <div class="info">
        <div class="song-title">L！L！L！</div>
        <div class="song-subtitle">宮下愛 · Circle of Love</div>
        <button class="play-btn" id="playBtn" onclick="startPlay()">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          开始播放
        </button>
        <div class="tap-hint" id="tapHint">👆 请轻触按钮启动网易云音乐</div>
        <div class="status" id="status"></div>
        <button class="fallback-btn" id="fallbackBtn" onclick="openWebVersion()">未能启动？点此打开网页版</button>
      </div>
    </div>
  </div>
  <div class="nfc-hint">📳 NFC 贴纸碰一碰 · 网易云音乐</div>

<script>
// 荧光棒海洋
(function() {
  var container = document.getElementById('crowd');
  var colors = [
    { r: 255, g: 80, b: 150, peak: 1, base: 0.5 },  // 粉色
    { r: 80, g: 180, b: 255, peak: 0.9, base: 0.4 },  // 蓝色
    { r: 200, g: 80, b: 255, peak: 0.85, base: 0.35 }, // 紫色
    { r: 255, g: 220, b: 80, peak: 0.8, base: 0.3 },  // 黄色
    { r: 255, g: 150, b: 50, peak: 0.8, base: 0.3 }    // 橙色
  ];
  for (var i = 0; i < 80; i++) {
    var c = colors[Math.floor(Math.random() * colors.length)];
    var glow = document.createElement('div');
    glow.className = 'glowstick';
    var size = 4 + Math.random() * 6;
    glow.style.cssText =
      'width:' + size + 'px;height:' + size + 'px;' +
      'left:' + (Math.random() * 100) + '%;' +
      'top:' + (40 + Math.random() * 60) + '%;' +
      'background:rgba(' + c.r + ',' + c.g + ',' + c.b + ',0.9);' +
      'box-shadow:0 0 ' + (size * 2) + 'px rgba(' + c.r + ',' + c.g + ',' + c.b + ',0.6);' +
      '--peak:' + c.peak + ';--base:' + c.base + ';' +
      '--dur:' + (1 + Math.random() * 2) + 's;' +
      'animation-delay:' + (Math.random() * 3) + 's';
    container.appendChild(glow);
  }
})();

// 焰火
(function() {
  var container = document.getElementById('fireworks');
  var fwColors = ['#ff4060', '#ffcc00', '#ff8060', '#ffffff', '#ffa0c0'];
  for (var i = 0; i < 8; i++) {
    var fw = document.createElement('div');
    fw.className = 'firework';
    var size = 30 + Math.random() * 50;
    var c = fwColors[Math.floor(Math.random() * fwColors.length)];
    fw.style.cssText =
      'width:' + size + 'px;height:' + size + 'px;' +
      'background:radial-gradient(circle,' + c + ',transparent);' +
      'box-shadow:0 0 ' + (size/2) + 'px ' + c + ';' +
      'left:' + (10 + Math.random() * 80) + '%;' +
      'top:' + (Math.random() * 30) + '%;' +
      'animation-delay:' + (0.5 + Math.random() * 2) + 's';
    container.appendChild(fw);
  }
})();

// 8秒后切换
setTimeout(function() {
  document.getElementById('intro').classList.add('fade-out');
  setTimeout(function() {
    document.getElementById('intro').classList.add('hidden');
    document.getElementById('main').classList.add('show');
  }, 1500);
}, 8000);

// 播放逻辑
var SONG_ID = '1887056125';
var NETEASE_SCHEME = 'orpheus://song/' + SONG_ID;
var ANDROID_INTENT = 'intent://orpheus/song/' + SONG_ID + '#Intent;scheme=orpheus;package=com.netease.cloudmusic;end';
var WEB_URL = 'https://y.music.163.com/m/song?id=' + SONG_ID;
var isAndroid = /Android/i.test(navigator.userAgent);
var playing = false, launched = false;
var status = document.getElementById('status');
var fallbackBtn = document.getElementById('fallbackBtn');
var tapHint = document.getElementById('tapHint');

function showStatus(msg, cls) { status.textContent = msg; status.className = 'status show ' + (cls || ''); }
function openWebVersion() { window.location.href = WEB_URL; }

function startPlay() {
  if (playing) return;
  playing = true; launched = false;
  tapHint.style.display = 'none';
  showStatus('正在启动网易云音乐…', '');
  if (isAndroid) {
    window.location.href = ANDROID_INTENT;
    setTimeout(function() { if (!document.hidden && !launched) { launched = true; window.location.href = NETEASE_SCHEME; } }, 1200);
    setTimeout(function() { if (!document.hidden && !launched) { launched = true; fallbackBtn.classList.add('show'); } }, 2500);
  } else {
    window.location.href = NETEASE_SCHEME;
    setTimeout(function() { if (!document.hidden) openWebVersion(); }, 2000);
  }
}
document.addEventListener('visibilitychange', function() {
  if (document.hidden) { launched = true; showStatus('🎉 网易云音乐已启动', 'ok'); }
});
</script>
</body>
</html>
