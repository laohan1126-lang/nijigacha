<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>大道之爭 · 测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050508; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: system-ui, sans-serif; }
#box { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(5,3,12,.98) 0%, transparent 100%); padding: 20px 24px 40px; }
#speaker { color: #c8a04a; font-size: 13px; letter-spacing: 3px; margin-bottom: 10px; }
#text { color: #e8e0d0; font-size: 16px; line-height: 1.8; min-height: 60px; letter-spacing: 1px; }
#next { position: fixed; bottom: 100px; right: 24px; color: rgba(255,255,255,.3); font-size: 24px; animation: blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:.3} 50%{opacity:.8} }
#choices { position: fixed; bottom: 180px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 500px; }
.choice { background: rgba(10,8,20,.95); border: 1px solid rgba(200,160,74,.4); color: #c8a04a; padding: 14px 18px; border-radius: 8px; font-size: 14px; cursor: pointer; text-align: left; letter-spacing: 1px; transition: all .2s; }
.choice:hover { background: rgba(200,160,74,.15); border-color: rgba(200,160,74,.8); transform: translateX(4px); }
</style>
</head>
<body>

<div id="box">
  <div id="speaker"></div>
  <div id="text"></div>
</div>
<div id="next">▼</div>
<div id="choices"></div>

<script>
const BASE = 'https://16df4b2f55fe6953-106-53-185-132.serveousercontent.com';
const IMG = {
  shangchen: BASE + '/shangchen.png',
  mengzi: BASE + '/mengzi.png',
  zhuti: BASE + '/protagonist.png'
};

let fullText = '', charIdx = 0, timer = null, waiting = false, idx = 0;

const scenes = [
  { speaker: '旁白', text: '秦國大殿，七國使臣雲集。今日是秦王設下的「以言定策」——三個問題，三種回答，勝者得三城。' },
  { speaker: '旁白', text: '你，一位無派別的遊士，坐在大殿最末席。左右兩側，分別端坐著——' },
  { speaker: '旁白', text: '商臣，韓非子後裔，法家嫡傳，據說舌戰七國未嘗一敗。' },
  { speaker: '旁白', text: '孟軻，儒家飽學之儒，周遊列國而不得用，卻在此處與法家對坐。' },
  { speaker: '旁白', text: '秦王高坐，聲如寒冰：「三個問題，請三位作答。第一問——」' },
  { speaker: '秦王', text: '「天下大亂，病因何在？」' },
  { speaker: '商臣', text: '「天下大亂，病因唯有一字——弱。弱肉強食，此天道也。」' },
  { speaker: '孟軻', text: '「不然。天下之亂，亂於失德。諸侯攻城略地，是因無仁政；人心不古，是因無教化。」' },
  { speaker: '秦王', text: '「遊士，你以為如何？」' },
  { speaker: '你', text: '「……」（請做出你的選擇）' },
  { type: 'choice', options: [
    { text: '「我贊同法家。刑名約束，方能定天下。」', next: 100 },
    { text: '「我贊同儒家。以德服人，斯四方來服。」', next: 200 },
    { text: '「諸侯所征者，何地？若無民，何來天下？」', next: 300 }
  ]},
  // 分支100
  { speaker: '商臣', text: '「善。你見過山火嗎？林中枯木積久，一火焚之，方有新芽破土。」' },
  { speaker: '孟軻', text: '「以草木喻人，未免輕賤。民非枯木，乃有血有肉之人。」' },
  { speaker: '旁白', text: '【結局A：法家之路】你選擇了霸道。從此捲入秦國朝堂的漩渦——' },
  // 分支200
  { speaker: '孟軻', text: '「善。民心如水，水能載舟，亦能覆舟。得民心者，得天下。」' },
  { speaker: '商臣', text: '「可笑。民如水，卻不知水能決堤。沒有刑名約束，民變不過一聲吶喊。」' },
  { speaker: '旁白', text: '【結局B：儒法並存】你試圖在理想與現實之間找到橋樑——' },
  // 分支300
  { speaker: '商臣', text: '「問得好。但民之於國，如水之於渠。渠正則水清，渠斜則水濁。」' },
  { speaker: '孟軻', text: '「若民心本善，何須渠來正之？刑名是堵，水善下而攻。」' },
  { speaker: '旁白', text: '【結局C：天道觀察者】你不屬於任何一派，卻讓所有派別都開始思考——' },
];

const $speaker = document.getElementById('speaker');
const $text = document.getElementById('text');
const $next = document.getElementById('next');
const $choices = document.getElementById('choices');

function typeText(text, cb) {
  clearInterval(timer);
  fullText = text; charIdx = 0; $text.textContent = '';
  $next.style.opacity = '0';
  timer = setInterval(() => {
    if (charIdx < fullText.length) {
      $text.textContent += fullText[charIdx++];
    } else {
      clearInterval(timer); fullText = '';
      $next.style.opacity = '1';
      if (cb) cb();
    }
  }, 35);
}

function playScene() {
  if (idx >= scenes.length) return;
  const s = scenes[idx];

  if (s.type === 'choice') {
    $next.style.opacity = '0';
    $choices.innerHTML = '';
    s.options.forEach(o => {
      const btn = document.createElement('button');
      btn.className = 'choice'; btn.textContent = o.text;
      btn.onclick = () => { $choices.innerHTML = ''; idx = o.next; playScene(); };
      $choices.appendChild(btn);
    });
    return;
  }

  $speaker.textContent = s.speaker || '　';
  waiting = false;
  typeText(s.text, () => { waiting = true; });
}

document.addEventListener('click', (e) => {
  if (e.target.closest('#choices')) return;
  if (fullText) { clearInterval(timer); $text.textContent = fullText; fullText = ''; $next.style.opacity = '1'; return; }
  if (waiting) { waiting = false; idx++; playScene(); }
});

playScene();
</script>
</body>
</html>
