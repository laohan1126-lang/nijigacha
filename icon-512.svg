<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a28"/>
      <stop offset="50%" style="stop-color:#2d1150"/>
      <stop offset="100%" style="stop-color:#1a0a28"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7090"/>
      <stop offset="25%" style="stop-color:#c080e0"/>
      <stop offset="50%" style="stop-color:#6080ff"/>
      <stop offset="75%" style="stop-color:#40e0d0"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="capsule" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8fab"/>
      <stop offset="40%" style="stop-color:#e060a0"/>
      <stop offset="100%" style="stop-color:#9050c0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c080e0;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#c080e0;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Glow circle -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Rainbow ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#rainbow)" stroke-width="20" opacity="0.8"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8"/>

  <!-- Capsule body -->
  <ellipse cx="256" cy="290" rx="90" ry="25" fill="rgba(0,0,0,0.3)"/>

  <!-- Top dome -->
  <path d="M166 260 Q166 170 256 170 Q346 170 346 260 Z" fill="url(#capsule)"/>
  <path d="M186 240 Q186 190 256 190 Q326 190 326 240 Q326 260 256 260 Q186 260 186 240" fill="rgba(255,255,255,0.3)"/>

  <!-- Bottom capsule -->
  <path d="M166 255 Q166 340 256 350 Q346 340 346 255 Z" fill="#e060a0"/>
  <path d="M166 255 Q256 270 346 255" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>

  <!-- Center sparkle stars -->
  <text x="256" y="235" text-anchor="middle" font-size="60" fill="rgba(255,255,255,0.9)">✦</text>

  <!-- Bottom label -->
  <rect x="156" y="360" width="200" height="60" rx="15" fill="rgba(255,255,255,0.1)"/>
  <text x="256" y="388" text-anchor="middle" font-size="22" font-weight="bold" fill="url(#rainbow)" letter-spacing="8">虹杂</text>
  <text x="256" y="410" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.5)" letter-spacing="4">启动</text>
</svg>
