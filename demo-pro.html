<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>进阶效果示例</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; min-height: 100vh; padding: 40px 20px; font-family: system-ui, sans-serif; }
h1 { color: #fff; text-align: center; margin-bottom: 40px; font-size: 24px; letter-spacing: 4px; }
.grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 1000px; margin: 0 auto; }
.demo-item { display: flex; flex-direction: column; align-items: center; }
.demo-label { color: rgba(255,255,255,.4); font-size: 10px; text-align: center; margin-top: 12px; letter-spacing: 1px; }

/* 1. 3D翻牌效果 */
.card-3d { width: 160px; height: 220px; perspective: 800px; cursor: pointer; }
.card-3d-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform .8s cubic-bezier(.4,0,.2,1); }
.card-3d:hover .card-3d-inner { transform: rotateY(180deg); }
.card-3d-front, .card-3d-back { position: absolute; width: 100%; height: 100%; border-radius: 16px; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.card-3d-front { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 2px solid #e03060; color: #fff; font-size: 14px; }
.card-3d-back { background: linear-gradient(135deg, #e03060, #ff6090); transform: rotateY(180deg); color: #fff; font-size: 13px; text-align: center; padding: 20px; }

/* 2. 文字乱码/加密效果 */
.scramble { font-size: 24px; font-weight: bold; color: #60c0ff; font-family: monospace; letter-spacing: 4px; cursor: pointer; user-select: none; }

/* 3. 万花筒旋转 */
.kaleido { width: 140px; height: 140px; position: relative; cursor: pointer; }
.kaleido-item { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, #ff6090, #c080e0, #4060ff, #60c0ff, #ffd700, #ff6090); animation: kaleido-spin 4s linear infinite; }
.kaleido-item::before { content: ''; position: absolute; inset: 20px; border-radius: 50%; background: #0a0a1a; }
.kaleido-item::after { content: ''; position: absolute; inset: 35px; border-radius: 50%; background: conic-gradient(from 180deg, #ff6090, #c080e0, #4060ff, #60c0ff, #ffd700, #ff6090); animation: kaleido-spin 4s linear infinite reverse; }
@keyframes kaleido-spin { to{transform: rotate(360deg)} }

/* 4. 3D视差深度的卡 */
.parallax-card { width: 160px; height: 220px; border-radius: 16px; position: relative; cursor: pointer; overflow: hidden; }
.parallax-layer { position: absolute; inset: 0; border-radius: 16px; transition: transform .1s ease-out; display: flex; align-items: center; justify-content: center; }
.parallax-bg { background: linear-gradient(135deg, #1a1a2e, #16213e); z-index: 1; }
.parallax-text { color: rgba(255,255,255,.15); font-size: 60px; font-weight: bold; z-index: 2; text-shadow: 0 4px 20px rgba(224,48,96,.3); }
.parallax-glow { background: radial-gradient(ellipse at center, rgba(224,48,96,.4) 0%, transparent 70%); z-index: 3; }

/* 5. SVG路径动画进度圈 */
.progress-ring { transform: rotate(-90deg); cursor: pointer; }
.progress-ring circle { fill: none; stroke-width: 6; stroke-linecap: round; }
.progress-ring .bg { stroke: rgba(255,255,255,.1); }
.progress-ring .fg { stroke: #e03060; stroke-dasharray: 188.5; stroke-dashoffset: 188.5; transition: stroke-dashoffset 1s ease; }
.ring-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-size: 13px; cursor: pointer; }

/* 6. 文字流星雨 */
.meteor-wrap { width: 200px; height: 80px; background: #0a0a1a; border-radius: 12px; position: relative; overflow: hidden; cursor: pointer; }
.meteor { position: absolute; color: #60c0ff; font-size: 14px; white-space: nowrap; animation: meteor-fall 2s linear infinite; opacity: 0; }
.meteor:nth-child(1){left:10%;animation-delay:0s}
.meteor:nth-child(2){left:30%;animation-delay:.4s}
.meteor:nth-child(3){left:50%;animation-delay:.8s}
.meteor:nth-child(4){left:70%;animation-delay:1.2s}
.meteor:nth-child(5){left:90%;animation-delay:1.6s}
@keyframes meteor-fall { 0%{top:-20px;opacity:0;transform:translateX(0)} 10%{opacity:1} 90%{opacity:1} 100%{top:80px;opacity:0;transform:translateX(20px)} }

/* 7. 波纹扩散按钮 */
.ripple-btn { position: relative; padding: 12px 28px; border-radius: 50px; background: linear-gradient(90deg, #e03060, #c02050); color: #fff; font-size: 13px; font-weight: bold; letter-spacing: 2px; border: none; cursor: pointer; overflow: hidden; box-shadow: 0 6px 24px rgba(224,48,96,.4); }
.ripple-btn .wave { position: absolute; border-radius: 50%; background: rgba(255,255,255,.4); transform: scale(0); animation: ripple-out .6s ease-out forwards; pointer-events: none; }
@keyframes ripple-out { to{transform:scale(4);opacity:0} }

/* 8. 雪碧图帧动画 */
.sprite-wrap { width: 80px; height: 80px; cursor: pointer; position: relative; }
.sprite { width: 100%; height: 100%; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #ff6090, #c02050); animation: sprite-spin 1s steps(8) infinite; box-shadow: 0 0 20px rgba(224,48,96,.5); }
@keyframes sprite-spin { to{transform:rotate(360deg)} }

/* 9. 渐变描边动画边框 */
.border-anim { width: 160px; height: 100px; border-radius: 12px; position: relative; cursor: pointer; }
.border-anim::before { content: ''; position: absolute; inset: -3px; border-radius: 14px; background: conic-gradient(from 0deg, #ff6090, #ffd700, #60c0ff, #c080e0, #ff6090); background-size: 300% 300%; animation: border-flow 2s linear infinite; z-index: -1; }
.border-anim::after { content: ''; position: absolute; inset: 0; border-radius: 12px; background: #1a1a2e; z-index: -1; }
@keyframes border-flow { 0%{background-position:0% 50%} 100%{background-position:300% 50%} }

/* 10. 多层扭曲波纹 */
.wave-wrap { width: 160px; height: 100px; position: relative; cursor: pointer; overflow: hidden; border-radius: 12px; }
.wave-layer { position: absolute; bottom: 0; left: -50%; width: 200%; height: 100px; background: linear-gradient(to top, rgba(224,48,96,.3), transparent); border-radius: 40% 40% 0 0; animation: wave-move 3s ease-in-out infinite; }
.wave-layer:nth-child(2){background:linear-gradient(to top,rgba(96,192,255,.2),transparent);animation-delay:-1s;animation-duration:4s}
.wave-layer:nth-child(3){background:linear-gradient(to top,rgba(192,128,224,.15),transparent);animation-delay:-2s;animation-duration:5s}
@keyframes wave-move { 0%,100%{transform:translateX(0) scaleY(1)} 50%{transform:translateX(10%) scaleY(1.2)} }
</style>
</head>
<body>
<h1>进 阶 效 果</h1>
<div class="grid">
  <div class="demo-item">
    <div class="card-3d">
      <div class="card-3d-inner">
        <div class="card-3d-front">hover 我<br>↑<br>翻转到背面</div>
        <div class="card-3d-back">这是背面<br>可以放属性<br>或者签名</div>
      </div>
    </div>
    <div class="demo-label">1. 3D翻牌效果</div>
  </div>

  <div class="demo-item">
    <div class="scramble" id="scramble1" onclick="scramble(this,'S S R')">S S R</div>
    <div class="demo-label">2. 文字乱码效果<br>（点我解密）</div>
  </div>

  <div class="demo-item">
    <div class="kaleido"><div class="kaleido-item"></div></div>
    <div class="demo-label">3. 万花筒旋转</div>
  </div>

  <div class="demo-item">
    <div class="parallax-card" id="parallax1">
      <div class="parallax-layer parallax-bg"></div>
      <div class="parallax-layer parallax-glow"></div>
      <div class="parallax-layer parallax-text">S</div>
    </div>
    <div class="demo-label">4. 3D鼠标视差<br>（移动鼠标）</div>
  </div>

  <div class="demo-item">
    <div style="position:relative;width:80px;height:80px;" onclick="this.querySelector('.fg').style.strokeDashoffset='37.7'; setTimeout(()=>this.querySelector('.fg').style.strokeDashoffset='188.5',2500)">
      <svg class="progress-ring" width="80" height="80" viewBox="0 0 70 70">
        <circle class="bg" cx="35" cy="35" r="30"/>
        <circle class="fg" cx="35" cy="35" r="30"/>
      </svg>
      <div class="ring-label">点我<br>80% ▸ 0%</div>
    </div>
    <div class="demo-label">5. SVG进度环<br>动画</div>
  </div>

  <div class="demo-item">
    <div class="meteor-wrap">
      <div class="meteor">★</div>
      <div class="meteor">★</div>
      <div class="meteor">★</div>
      <div class="meteor">★</div>
      <div class="meteor">★</div>
    </div>
    <div class="demo-label">6. 流星雨文字</div>
  </div>

  <div class="demo-item">
    <button class="ripple-btn" onclick="ripple(event,this)">✨ 抽 卡</button>
    <div class="demo-label">7. 波纹扩散按钮</div>
  </div>

  <div class="demo-item">
    <div class="sprite-wrap">
      <div class="sprite"></div>
    </div>
    <div class="demo-label">8. CSS帧动画<br>（纯代码旋转）</div>
  </div>

  <div class="demo-item">
    <div class="border-anim" style="display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;">S S R</div>
    <div class="demo-label">9. 渐变描边动画</div>
  </div>

  <div class="demo-item">
    <div class="wave-wrap">
      <div class="wave-layer"></div>
      <div class="wave-layer"></div>
      <div class="wave-layer"></div>
    </div>
    <div class="demo-label">10. 多层波浪动画</div>
  </div>
</div>

<script>
// 文字乱码效果
const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%';
function scramble(el, target) {
  let frame = 0, iterations = 0;
  function step() {
    el.textContent = target.split('').map((c,i) => {
      if(i < iterations) return target[i];
      return chars[Math.floor(Math.random()*chars.length)];
    }).join('');
    if(frame % 3 === 0) iterations++;
    if(iterations <= target.length) { frame++; requestAnimationFrame(step); }
    else el.textContent = target;
  }
  step();
}

// 3D鼠标视差
document.getElementById('parallax1').addEventListener('mousemove', function(e) {
  const rect = this.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width - 0.5;
  const y = (e.clientY - rect.top) / rect.height - 0.5;
  this.querySelector('.parallax-bg').style.transform = `translate(${x*10}px, ${y*10}px)`;
  this.querySelector('.parallax-glow').style.transform = `translate(${x*-15}px, ${y*-15}px)`;
  this.querySelector('.parallax-text').style.transform = `translate(${x*8}px, ${y*8}px)`;
});
document.getElementById('parallax1').addEventListener('mouseleave', function() {
  ['.parallax-bg','.parallax-glow','.parallax-text'].forEach(s => this.querySelector(s).style.transform='');
});

// 波纹按钮
function ripple(e, btn) {
  const circle = document.createElement('span');
  circle.className = 'wave';
  const rect = btn.getBoundingClientRect();
  circle.style.left = (e.clientX - rect.left) + 'px';
  circle.style.top = (e.clientY - rect.top) + 'px';
  circle.style.width = circle.style.height = '10px';
  btn.appendChild(circle);
  setTimeout(()=> circle.remove(), 600);
}
</script>
</body>
</html>
