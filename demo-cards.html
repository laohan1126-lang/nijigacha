<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡片动画示例</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; min-height: 100vh; padding: 40px 20px; font-family: system-ui, sans-serif; }
h1 { color: #fff; text-align: center; margin-bottom: 40px; font-size: 24px; letter-spacing: 4px; }
.grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 900px; margin: 0 auto; }

/* 1. 抽卡弹出动画 */
.card1 { width: 160px; height: 220px; background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 16px; border: 2px solid #e03060; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: transform .2s; position: relative; overflow: hidden; }
.card1::before { content: 'S'; position: absolute; top: -20px; right: -20px; width: 60px; height: 60px; background: linear-gradient(135deg, #e03060, #ff6090); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #fff; box-shadow: 0 4px 20px rgba(224,48,96,.5); }
.card1:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 20px 40px rgba(224,48,96,.3); }
.card1:active { transform: scale(.95); }
.card1.animate { animation: card-pop .6s cubic-bezier(.4,0,.2,1); }
@keyframes card-pop { 0%{transform:scale(0) rotate(-10deg); opacity:0} 60%{transform:scale(1.1) rotate(2deg)} 100%{transform:scale(1) rotate(0)} }

/* 2. 霓虹光晕卡片 */
.card2 { width: 160px; height: 220px; background: #0d0d1a; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; }
.card2::after { content: ''; position: absolute; inset: -2px; border-radius: 18px; background: conic-gradient(from 0deg, #ff6090, #c080e0, #4060ff, #60c0ff, #ff6090); z-index: -1; animation: neon-spin 3s linear infinite; }
@keyframes neon-spin { to{filter:hue-rotate(360deg)} }
.card2:hover::after { animation-duration: 1s; }

/* 3. 玻璃态卡片 */
.card3 { width: 160px; height: 220px; background: rgba(255,255,255,.05); backdrop-filter: blur(10px); border-radius: 16px; border: 1px solid rgba(255,255,255,.1); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; cursor: pointer; transition: all .3s; }
.card3:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.3); transform: translateY(-4px); }

/* 4. 彩虹渐变文字 */
.text1 { font-size: 28px; font-weight: bold; background: linear-gradient(90deg, #ff6090, #ff9060, #ffd700, #90ff60, #60d0ff, #c080e0, #ff6090); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: rainbow-shift 3s linear infinite; }
@keyframes rainbow-shift { to{background-position:200% center} }

/* 5. 脉冲呼吸灯 */
.pulse { width: 80px; height: 80px; border-radius: 50%; background: radial-gradient(circle, #e03060, #c02050); box-shadow: 0 0 0 0 rgba(224,48,96,.7); animation: breathe 2s infinite; cursor: pointer; }
@keyframes breathe { 0%,100%{box-shadow:0 0 0 0 rgba(224,48,96,.7)} 50%{box-shadow:0 0 0 20px rgba(224,48,96,0)} }

/* 6. 文字打字机 */
.typewriter { color: #fff; font-size: 20px; overflow: hidden; white-space: nowrap; border-right: 2px solid #e03060; width: 0; animation: typing 3s steps(20) forwards, blink .7s step-end infinite; }
@keyframes typing { to { width: 100% } } @keyframes blink { 50%{border-color: transparent} }

/* 7. 悬浮粒子效果 */
.particle-box { width: 200px; height: 120px; background: #0d0d1a; border-radius: 12px; position: relative; overflow: hidden; cursor: pointer; }
.particle { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: #ff6090; animation: float-up 3s infinite; }
.particle:nth-child(1){left:20%;animation-delay:0s;background:#ff6090}
.particle:nth-child(2){left:40%;animation-delay:.5s;background:#c080e0}
.particle:nth-child(3){left:60%;animation-delay:1s;background:#60c0ff}
.particle:nth-child(4){left:80%;animation-delay:1.5s;background:#ffd700}
.particle:nth-child(5){left:50%;animation-delay:2s;background:#ff9060}
@keyframes float-up { 0%{bottom:-10px;opacity:1;transform:scale(1)} 100%{bottom:130px;opacity:0;transform:scale(0)} }

/* 8. 渐变背景动画 */
.gradient-bg { width: 200px; height: 100px; border-radius: 12px; background: linear-gradient(-45deg, #0d0d1a, #1a1a3e, #2a1a4e, #1a2a4e); background-size: 400% 400%; animation: gradient-shift 5s ease infinite; cursor: pointer; }
@keyframes gradient-shift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

/* 9. 弹跳按钮 */
.bounce-btn { padding: 12px 32px; border-radius: 50px; background: linear-gradient(90deg, #e03060, #c02050); color: #fff; font-size: 14px; font-weight: bold; letter-spacing: 2px; border: none; cursor: pointer; box-shadow: 0 6px 24px rgba(224,48,96,.4); transition: all .2s; }
.bounce-btn:hover { box-shadow: 0 8px 32px rgba(224,48,96,.6); transform: translateY(-2px); }
.bounce-btn:active { transform: scale(.96); }
.bounce-btn.bounce { animation: bounce-effect .4s; }
@keyframes bounce-effect { 0%{transform:scale(1)} 30%{transform:scale(.9)} 60%{transform:scale(1.05)} 100%{transform:scale(1)} }

/* 10. 星星闪烁 */
.stars { width: 200px; height: 100px; background: #0a0a1a; border-radius: 12px; position: relative; overflow: hidden; cursor: pointer; }
.star { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: #fff; }
.star:nth-child(1){top:20%;left:15%;animation:twinkle 1.5s infinite}
.star:nth-child(2){top:30%;left:45%;animation:twinkle 2s infinite .3s}
.star:nth-child(3){top:15%;left:70%;animation:twinkle 1.8s infinite .6s}
.star:nth-child(4){top:50%;left:25%;animation:twinkle 2.2s infinite .9s}
.star:nth-child(5){top:60%;left:80%;animation:twinkle 1.6s infinite 1.2s}
.star:nth-child(6){top:40%;left:55%;animation:twinkle 2.5s infinite .4s}
@keyframes twinkle { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(.5)} }

.demo-label { color: rgba(255,255,255,.4); font-size: 10px; text-align: center; margin-top: 12px; letter-spacing: 1px; }
</style>
</head>
<body>
<h1>效 果 示 例</h1>
<div class="grid">
  <div>
    <div class="card1" onclick="this.classList.add('animate'); setTimeout(()=>this.classList.remove('animate'),700)">
      <span style="color:#fff;font-size:14px;">点我弹跳</span>
    </div>
    <div class="demo-label">1. 抽卡弹出动画</div>
  </div>
  <div>
    <div class="card2" style="color:#fff;font-size:14px;">hover 旋转色轮</div>
    <div class="demo-label">2. 霓虹光晕边框</div>
  </div>
  <div>
    <div class="card3" style="font-size:14px;">毛玻璃背景<br>Glassmorphism</div>
    <div class="demo-label">3. 玻璃态卡片</div>
  </div>
  <div>
    <div class="text1">S S R</div>
    <div class="demo-label">4. 彩虹渐变文字</div>
  </div>
  <div>
    <div class="pulse"></div>
    <div class="demo-label">5. 脉冲呼吸灯</div>
  </div>
  <div>
    <div class="typewriter">正在连接服务器...</div>
    <div class="demo-label">6. 打字机效果</div>
  </div>
  <div>
    <div class="particle-box">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>
    <div class="demo-label">7. 上浮粒子</div>
  </div>
  <div>
    <div class="gradient-bg"></div>
    <div class="demo-label">8. 渐变背景动画</div>
  </div>
  <div>
    <button class="bounce-btn" onclick="this.classList.add('bounce'); setTimeout(()=>this.classList.remove('bounce'),400)">抽 卡</button>
    <div class="demo-label">9. 弹跳按钮</div>
  </div>
  <div>
    <div class="stars">
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
    </div>
    <div class="demo-label">10. 星星闪烁</div>
  </div>
</div>
</body>
</html>
