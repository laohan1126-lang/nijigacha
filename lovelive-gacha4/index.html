<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>LoveLive!</title>
 <link rel="stylesheet" href="style.css?v=20260415">
</head>
<body>

 <audio id="bgm" loop>
 <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
 </audio>
 <audio id="sound-effect">
 <source src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" type="audio/mpeg">
 </audio>

 <button class="bgm-toggle" id="bgmBtn" onclick="toggleMusic()">🎵</button>

 <!-- 首页 -->
 <section id="home-page" class="page active">
  <div class="home-bg"></div>
  <div class="home-content">
   <h1 class="home-title">LoveLive!</h1>
   <input type="text" id="user-cn" class="home-input" placeholder="輸入cn 選擇你的英雄">
   <br>
   <button class="draw-btn" onclick="drawCardPro()">拉拉人 啟動！</button>
  </div>
 </section>

 <!-- 结果页 -->
 <section id="result-page" class="page result-view">
  <div class="result-container">
   <div class="user-info-banner">
    <span id="user-display-name">製作人</span> 抽到了！
   </div>
   <div class="rarity-banner" id="rarity-style">
    <span id="card-rarity">SSR · 神級角色</span>
   </div>

   <div class="main-card">
    <div class="card-header-flex">
     <div class="avatar-wrapper">
      <img id="card-image" src="" alt="立繪">
      <div class="avatar-placeholder" id="art-placeholder">IMAGE</div>
     </div>
     <div class="basic-info">
      <h1 id="card-name">優木雪菜</h1>
      <p class="jp-name" id="card-name-jp">優木 せつ菜</p>
      <p class="cv-info">CV: <span id="card-cv">楠木ともり</span></p>
      <div class="tags-row">
       <span class="tag-label" id="group-tag">虹咲學園</span>
       <span class="tag-label secondary" id="subunit-tag">A·ZU·NA</span>
      </div>
      <p class="solo-song">Solo曲：<span id="card-song">CHASE!</span></p>
     </div>
    </div>

    <div class="section-content">
     <h3 class="section-label">◆ 角色介紹</h3>
     <p class="desc-text" id="card-personality"></p>
     <div class="quote-line">
      「<span id="card-quote"></span>」
     </div>
    </div>

    <div class="section-content">
     <h3 class="section-label">◆ 高光軌跡</h3>
     <p class="desc-text" id="card-hotstory"></p>
    </div>

    <div class="trivia-footer-box">
     <h3 class="section-label">✦ 小知識</h3>
     <p id="card-trivia" class="trivia-text"></p>
    </div>
   </div>
  </div>
  <button class="btn-close" onclick="backToHomePro()">關閉檔案</button>
 </section>

 <!-- Toast 提示 -->
 <div id="toast"></div>

 <script src="data.js"></script>
 <script src="script.js?v=20260415"></script>
</body>
</html>
