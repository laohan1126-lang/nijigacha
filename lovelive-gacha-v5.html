<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LoveLive! 全团体扭蛋</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a0a28">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="https://c252be261e79d654-106-53-185-132.serveousercontent.com/icon-256.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(135deg,#0a0518 0%,#1a0a28 50%,#0a0518 100%);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;color:#fff;overflow-x:hidden}
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.p{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d) ease-in-out infinite;opacity:0}
@keyframes tw{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.7;transform:scale(1.4)}}
.container{position:relative;z-index:1;max-width:520px;margin:0 auto;padding:16px 14px;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.header{text-align:center;margin-bottom:16px;width:100%}
.header-title{font-size:18px;font-weight:800;letter-spacing:4px;background:linear-gradient(90deg,#ff7090,#c080e0,#6080ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:3px}
.header-sub{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:3px}
.step{display:none;width:100%;flex-direction:column;align-items:center}
.step.active{display:flex}
.input-card{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:22px 18px;text-align:center;width:100%}
.input-title{font-size:14px;font-weight:700;margin-bottom:14px;color:rgba(255,255,255,.85)}
.group-count{display:flex;justify-content:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.group-chip{padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);transition:all .2s}
.group-chip.active{color:#fff;font-weight:700}
.group-chip[data-g="muse"]{border-color:rgba(255,107,157,.4)}
.group-chip[data-g="muse"].active{background:rgba(255,107,157,.25);color:#ff6b9d}
.group-chip[data-g="aqours"]{border-color:rgba(80,200,255,.4)}
.group-chip[data-g="aqours"].active{background:rgba(80,200,255,.25);color:#50c8ff}
.group-chip[data-g="niji"]{border-color:rgba(200,80,255,.4)}
.group-chip[data-g="niji"].active{background:rgba(200,80,255,.25);color:#c850ff}
.group-chip[data-g="liella"]{border-color:rgba(255,215,0,.4)}
.group-chip[data-g="liella"].active{background:rgba(255,215,0,.25);color:#ffd700}
.name-input{width:100%;padding:11px 14px;border-radius:14px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:15px;text-align:center;letter-spacing:2px;outline:none;transition:border-color .3s;margin-bottom:14px;font-family:inherit}
.name-input:focus{border-color:rgba(200,120,220,.7)}
.name-input::placeholder{color:rgba(255,255,255,.25);letter-spacing:3px}
.draw-btn{width:100%;padding:13px;border-radius:50px;background:linear-gradient(90deg,#e03060,#c02050);border:none;color:#fff;font-size:14px;font-weight:700;letter-spacing:4px;cursor:pointer;box-shadow:0 6px 24px rgba(200,30,60,.4);transition:all .2s;font-family:inherit}
.draw-btn:active{transform:scale(.96)}
.result-wrap{width:100%;display:none;padding:6px 0 20px}
.result-wrap.active{display:block}
.rarity-banner{text-align:center;padding:10px;border-radius:14px;margin-bottom:14px;font-size:12px;font-weight:800;letter-spacing:3px}
.rarity-S{background:linear-gradient(90deg,#ffd700,#ff8c00);color:#000;box-shadow:0 4px 20px rgba(255,200,0,.4)}
.rarity-A{background:linear-gradient(90deg,#c080e0,#8060ff);color:#fff;box-shadow:0 4px 16px rgba(180,100,255,.4)}
.rarity-B{background:linear-gradient(90deg,#60a0ff,#40c0e0);color:#fff;box-shadow:0 4px 16px rgba(80,160,255,.3)}
.rarity-C{background:linear-gradient(90deg,#60c080,#40a060);color:#fff;box-shadow:0 4px 16px rgba(80,180,100,.3)}
.main-card{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:18px;margin-bottom:14px}
.char-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.avatar-wrap{position:relative;flex-shrink:0}
.avatar-ring{position:absolute;top:-5px;left:-5px;right:-5px;bottom:-5px;border-radius:50%;border:3.5px solid}
.rarity-S .avatar-ring{border-color:#ffd700;box-shadow:0 0 18px rgba(255,200,0,.6)}
.rarity-A .avatar-ring{border-color:#c080e0;box-shadow:0 0 14px rgba(180,100,255,.5)}
.rarity-B .avatar-ring{border-color:#60a0ff;box-shadow:0 0 12px rgba(80,160,255,.4)}
.rarity-C .avatar-ring{border-color:#60c080;box-shadow:0 0 10px rgba(80,180,100,.3)}
.avatar-placeholder{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:rgba(255,255,255,.85)}
.char-info{flex:1;min-width:0}
.char-name{font-size:18px;font-weight:700;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.char-sub{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;margin-bottom:2px}
.char-cv{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
.char-attr{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.attr-tag{padding:2px 7px;border-radius:20px;font-size:9px;font-weight:600}
.bio-section{margin-bottom:12px}
.section-label{font-size:10px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:2px;margin-bottom:5px}
.bio-text{font-size:11px;color:rgba(255,255,255,.7);line-height:1.7}
.solo-section{margin-bottom:12px}
.solo-tag{background:linear-gradient(90deg,rgba(255,200,0,.2),rgba(255,140,0,.2));border:1px solid rgba(255,200,0,.3);color:#ffd700;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;display:inline-block}
.trivia-section{margin-bottom:12px}
.trivia-item{font-size:10px;color:rgba(255,255,255,.5);padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);line-height:1.6}
.trivia-item:last-child{border-bottom:none}
.group-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;margin-bottom:8px;letter-spacing:1px}
.group-badge.muse{background:rgba(255,107,157,.2);color:#ff6b9d;border:1px solid rgba(255,107,157,.3)}
.group-badge.aqours{background:rgba(80,200,255,.2);color:#50c8ff;border:1px solid rgba(80,200,255,.3)}
.group-badge.niji{background:rgba(200,80,255,.2);color:#c850ff;border:1px solid rgba(200,80,255,.3)}
.group-badge.liella{background:rgba(255,215,0,.2);color:#ffd700;border:1px solid rgba(255,215,0,.3)}
.btn-row{display:flex;gap:10px;width:100%}
.retry-btn{flex:1;padding:11px;border-radius:50px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);font-size:12px;font-weight:600;letter-spacing:2px;cursor:pointer;font-family:inherit;transition:all .2s}
.retry-btn:active{transform:scale(.96)}
.home-btn{flex:1;padding:11px;border-radius:50px;background:linear-gradient(90deg,#e03060,#c02050);border:none;color:#fff;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;font-family:inherit}
.home-btn:active{transform:scale(.96)}
.card-animate{animation:cardIn .5s ease-out}
@keyframes cardIn{0%{opacity:0;transform:scale(.85) translateY(20px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.loading-ring{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:#c080e0;border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;display:none}
.loading-ring.show{display:block}
.filter-info{font-size:10px;color:rgba(255,255,255,.3);text-align:center;margin-bottom:10px;letter-spacing:1px}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="container">
  <div class="header">
    <div class="header-title">LoveLive! 全团体扭蛋</div>
    <div class="header-sub">缪斯 · Aqours · 虹咲 · Liella!</div>
  </div>
  <div class="loading-ring" id="loadingRing"></div>
  <div class="step active" id="stepInput">
    <div class="input-card">
      <div class="input-title">输入名字，召唤你的命运之人</div>
      <div class="group-count" id="groupChips">
        <span class="group-chip active" data-g="all">全部42人</span>
        <span class="group-chip" data-g="muse">缪斯9人</span>
        <span class="group-chip" data-g="aqours">Aqours9人</span>
        <span class="group-chip" data-g="niji">虹咲13人</span>
        <span class="group-chip" data-g="liella">Liella!11人</span>
      </div>
      <input class="name-input" id="nameInput" placeholder="你的名字" maxlength="12">
      <button class="draw-btn" id="drawBtn">扭　蛋</button>
    </div>
  </div>
  <div class="step" id="stepResult">
    <div class="rarity-banner" id="rarityBanner">S RARE</div>
    <div class="main-card card-animate" id="mainCard">
      <div class="char-header">
        <div class="avatar-wrap">
          <div class="avatar-ring"></div>
          <div class="avatar-placeholder" id="charAvatar"></div>
        </div>
        <div class="char-info">
          <div class="char-name" id="charName"></div>
          <div class="char-sub" id="charSub"></div>
          <div class="char-cv" id="charCv"></div>
          <div class="char-attr" id="charAttr"></div>
        </div>
      </div>
      <div class="bio-section">
        <div class="section-label">性　格</div>
        <div class="bio-text" id="charBio"></div>
      </div>
      <div class="solo-section">
        <div class="section-label">代表SOLO曲</div>
        <div class="solo-tag" id="charSolo"></div>
      </div>
      <div class="trivia-section">
        <div class="section-label">小知识</div>
        <div id="charTrivia"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="retry-btn" id="retryBtn">再扭一次</button>
      <button class="home-btn" id="homeBtn">返回选择</button>
    </div>
  </div>
</div>
<script>

  }
}

  void card.offsetWidth;

  document.getElementById('charAttr').innerHTML=ah;

  document.getElementById('charSolo').textContent=char.solo;
  document.getElementById('charTrivia').innerHTML='<div class="trivia-item">'+char.trivia+'</div>';
}
function startDraw(){
  var pool=getFiltered();
  if(pool.length===0)return;
  var total=pool.reduce(function(s,c){return s+(5-c.rarity);},0);
  var r=Math.random()*total,cum=0;
  for(var i=0;i<pool.length;i++){
    cum+=(5-pool[i].rarity);
    if(r<cum){drawOne(pool[i]);return;}
  }
  drawOne(pool[pool.length-1]);
}
