<style>
:root {
 --primary: #0ff;
 --bg-dark: #0a0a0c;
 --card-dark: #121216;
 --text-main: #e0e0e0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
 background-color: var(--bg-dark);
 color: var(--text-main);
 font-family: 'Courier New', Courier, monospace;
 overflow-x: hidden;
 display: flex;
 justify-content: center;
 min-height: 100vh;
}
#app {
 width: 100%;
 max-width: 500px;
 position: relative;
 padding: 20px;
 display: flex;
 flex-direction: column;
 align-items: center;
}
.header { width: 100%; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 30px; }
.sys-text { font-size: 12px; color: #555; letter-spacing: 2px; }

/* 科技感按钮 */
.cyber-btn {
 background: transparent;
 border: 2px solid var(--primary);
 color: var(--primary);
 padding: 15px 40px;
 font-size: 18px;
 font-weight: bold;
 text-transform: uppercase;
 cursor: pointer;
 position: relative;
 overflow: hidden;
 transition: 0.3s;
 box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
}
.cyber-btn:active { background: var(--primary); color: #000; box-shadow: 0 0 20px rgba(0, 255, 255, 0.6); }

/* 档案卡片设计 */
#card-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; }
.hidden { display: none !important; }
.data-card {
 width: 100%;
 background: var(--card-dark);
 border-radius: 8px;
 border-left: 4px solid var(--primary);
 box-shadow: 10px 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
 position: relative;
 overflow: hidden;
 opacity: 0;
 transform: translateY(20px);
 transition: all 0.5s ease-out;
}
.data-card.show { opacity: 1; transform: translateY(0); }

/* 卡片内部排版 */
.visual-area { height: 180px; background: #000; overflow: hidden; position: relative; border-bottom: 1px solid rgba(255,255,255,0.1); }
.rider-photo { width: 100%; height: 100%; object-fit: cover; object-position: top center; opacity: 0; transition: opacity 0.6s ease-in-out, transform 0.6s ease-out; transform: scale(1.1) translateY(10px); -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%); mask-image: linear-gradient(to bottom, black 80%, transparent 100%); }
.data-card.show .rider-photo { opacity: 1; transform: scale(1) translateY(0); }
.emblem.hidden { display: none; }
.emblem { font-size: 40px; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); font-family: sans-serif; font-style: italic; }
.info-area { padding: 20px; }
h2#rider-name { font-size: 24px; color: #fff; margin-bottom: 20px; height: 28px; border-bottom: 1px dashed #333; padding-bottom: 5px; }

/* 数据行渐显效果 */
.stat-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.stat-row { display: flex; justify-content: space-between; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; }
.stat-row .label { color: #888; }
.stat-row .value { color: var(--primary); font-weight: bold; }
.quote-box { background: rgba(255,255,255,0.03); padding: 15px; border-left: 2px solid #555; border-radius: 0 4px 4px 0; font-size: 13px; line-height: 1.6; color: #ccc; min-height: 60px; }
.hidden-stat { opacity: 0; transform: translateX(-10px); transition: all 0.4s ease; }
.show-stat { opacity: 1; transform: translateX(0); }
.text-btn { margin-top: 30px; background: none; border: none; color: #777; cursor: pointer; text-decoration: underline; font-family: monospace; }
.screenshot-tip { margin-top: 16px; padding: 10px 16px; background: rgba(0,255,204,0.08); border: 1px dashed rgba(0,255,204,0.4); border-radius: 4px; color: rgba(0,255,204,0.7); font-size: 12px; letter-spacing: 1px; text-align: center; }

/* Toast */
#toast {
 position: fixed; bottom: 80px; left: 50%;
 transform: translateX(-50%) translateY(20px);
 background: rgba(0,0,0,0.9);
 color: var(--primary);
 padding: 12px 24px;
 border: 1px solid rgba(0,255,255,0.3);
 border-radius: 4px;
 font-size: 0.85rem;
 opacity: 0;
 transition: opacity 0.3s, transform 0.3s;
 pointer-events: none;
 z-index: 999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>

// ========================
// 音效系统系统（支持外链音频，留空则使用程序生成音）
// ========================
const sounds = {
 // 范例：填入外链后取消注释即可
 // click:   new Audio('https://你的cdn.com/click.mp3'),
 // scan:    new Audio('https://你的cdn.com/scan.mp3'),
 // success: new Audio('https://你的cdn.com/success.mp3')
};

function playSound(type) {
 const s = sounds[type];
 if (s && s.src && s.src !== window.location.href) {
  s.currentTime = 0;
  s.play().catch(() => {});
 }
}

// 程序生成变身音效（5音阶上升，无需外链）
let audioCtx = null;
function playTransform() {
 try {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const ctx = audioCtx;
  [200, 300, 400, 500, 600].forEach((freq, i) => {
   const osc = ctx.createOscillator();
   const gain = ctx.createGain();
   osc.type = 'square';
   osc.frequency.value = freq;
   gain.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.08);
   gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.15);
   osc.connect(gain); gain.connect(ctx.destination);
   osc.start(ctx.currentTime + i * 0.08);
   osc.stop(ctx.currentTime + i * 0.08 + 0.15);
  });
 } catch(e) {}
}

// Toast
function showToast(msg) {
 const t = document.getElementById('toast');
 t.innerText = msg; t.classList.add('show');
 setTimeout(() => t.classList.remove('show'), 2000);
}

// 打字机效果
function typeWriter(element, text, speed, callback) {
 element.innerHTML = '';
 let i = 0;
 function type() {
  if (i < text.length) {
   element.innerHTML += text.charAt(i);
   i++;
   setTimeout(type, speed);
  } else if (callback) {
   callback();
  }
 }
 type();
}

// DOM 元素
const drawBtn = document.getElementById('draw-btn');
const mainUi = document.getElementById('main-ui');
const cardWrapper = document.getElementById('card-wrapper');
const dataCard = document.querySelector('.data-card');
const resetBtn = document.getElementById('reset-btn');

// 抽卡逻辑
drawBtn.addEventListener('click', () => {
 playSound('click');
 mainUi.classList.add('hidden');
 cardWrapper.classList.remove('hidden');

 const result = riders[Math.floor(Math.random() * riders.length)];

 document.querySelectorAll('.hidden-stat').forEach(el => el.classList.remove('show-stat'));
 document.getElementById('rider-name').innerHTML = '';
 document.getElementById('quote').innerHTML = '';
 document.getElementById('fortune').innerText = result.fortune;
 document.getElementById('sync').innerText = result.sync;
 document.getElementById('item').innerText = result.item;

 document.documentElement.style.setProperty('--primary', result.color);
 const emblemEl = document.getElementById('rider-emblem');
 const riderImgEl = document.getElementById('rider-image');
 // 图片预加载：先设置地址，浏览器自动缓存
 if (result.img) {
  riderImgEl.src = result.img;
  emblemEl.classList.add('hidden');
 } else {
  riderImgEl.src = '';
  emblemEl.classList.remove('hidden');
  emblemEl.innerText = result.name.split(' ')[1].charAt(0);
 }

 setTimeout(() => {
  playSound('scan');
  dataCard.classList.add('show');

  setTimeout(() => {
   typeWriter(document.getElementById('rider-name'), "> " + result.name, 50, () => {
    const stats = document.querySelectorAll('.stat-row');
    stats.forEach((stat, index) => {
     setTimeout(() => { stat.classList.add('show-stat'); }, index * 300);
    });

    setTimeout(() => {
     document.querySelector('.quote-box').classList.add('show-stat');
     typeWriter(document.getElementById('quote'), result.quote, 30, () => {
      resetBtn.classList.add('show-stat');
      document.getElementById('screenshot-tip').classList.add('show-stat');
      playTransform();
      playSound('success');
     });
    }, stats.length * 300 + 200);
   });
  }, 600);
 }, 100);
});

// 再抽一次
resetBtn.addEventListener('click', () => {
 dataCard.classList.remove('show');
 resetBtn.classList.remove('show-stat');
 document.getElementById('screenshot-tip').classList.remove('show-stat');
 setTimeout(() => {
  cardWrapper.classList.add('hidden');
  mainUi.classList.remove('hidden');
 }, 500);
});
