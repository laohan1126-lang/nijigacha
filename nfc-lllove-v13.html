<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Circle of Love - L！L！L！</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100vh;
      background: #050a18;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* ========== 开场动画 ========== */
    .intro {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #050a18;
      transition: opacity 1.2s ease;
    }
    .intro.fade-out { opacity: 0; pointer-events: none; }
    .intro.hidden { display: none; }

    /* 星空背景 */
    .stars {
      position: absolute; width: 100%; height: 100%;
      background: radial-gradient(ellipse at 30% 40%, #0a1530 0%, #050a18 60%);
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 2s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    /* 3D环形轨道容器 */
    .rings-container {
      position: relative;
      width: 300px; height: 300px;
      transform-style: preserve-3d;
      perspective: 800px;
    }

    /* 环形 - 倾斜3D旋转 */
    .ring-3d {
      position: absolute;
      top: 50%; left: 50%;
      border-radius: 50%;
      border: 2px solid;
      animation: ring-rotate-3d var(--dur) linear infinite;
      transform-style: preserve-3d;
    }
    /* 外层环 - 冷色（蓝） */
    .ring-outer {
      width: 280px; height: 280px;
      margin: -140px 0 0 -140px;
      border-color: rgba(100, 180, 255, 0.5);
      box-shadow: 0 0 15px rgba(100, 180, 255, 0.3), 0 0 5px rgba(100, 180, 255, 0.2) inset;
      animation: ring-rotate-3d 8s linear infinite;
      transform-origin: center center 0;
    }
    /* 中层环 - 暖色（橙粉）渐变 */
    .ring-mid {
      width: 220px; height: 220px;
      margin: -110px 0 0 -110px;
      border-color: rgba(255, 180, 120, 0.6);
      box-shadow: 0 0 20px rgba(255, 150, 80, 0.4), 0 0 8px rgba(255, 180, 100, 0.2) inset;
      animation: ring-rotate-3d 6s linear infinite reverse;
    }
    /* 内层环 - 白色亮环 */
    .ring-inner {
      width: 160px; height: 160px;
      margin: -80px 0 0 -80px;
      border-color: rgba(255, 255, 255, 0.7);
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.5), 0 0 10px rgba(255, 220, 180, 0.3) inset;
      animation: ring-rotate-3d 4s linear infinite;
    }

    @keyframes ring-rotate-3d {
      from { transform: rotateX(70deg) rotateZ(0deg); }
      to { transform: rotateX(70deg) rotateZ(360deg); }
    }

    /* 中心发光 */
    .center-core {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 14px; height: 14px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff8f0, #ffcc88);
      box-shadow: 0 0 30px 15px rgba(255,200,100,0.6), 0 0 60px 30px rgba(255,150,80,0.3);
      animation: core-pulse 2s ease-in-out infinite;
      z-index: 10;
    }
    @keyframes core-pulse {
      0%, 100% { transform: translate(-50%,-50%) scale(1); }
      50% { transform: translate(-50%,-50%) scale(1.15); }
    }

    /* 暖色渐变光晕（从右下角透进来） */
    .warm-glow {
      position: absolute;
      width: 200%; height: 200%;
      top: 0; left: 0;
      background: radial-gradient(ellipse at 80% 80%, rgba(255,140,80,0.25) 0%, transparent 50%);
      pointer-events: none;
      animation: warm-pulse 4s ease-in-out infinite;
    }
    @keyframes warm-pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    /* 文字层 */
    .title-layer {
      position: absolute;
      text-align: center;
      z-index: 20;
      animation: title-rise 1.2s ease-out forwards;
      opacity: 0;
    }
    @keyframes title-rise {
      0% { opacity: 0; transform: translateY(30px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .title-en {
      font-size: 13px;
      letter-spacing: 8px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .title-main {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 4px;
      color: #fff;
      text-shadow: 0 0 30px rgba(255,200,100,0.6), 0 2px 20px rgba(0,0,0,0.5);
      margin-bottom: 6px;
    }
    .title-cn {
      font-size: 14px;
      letter-spacing: 6px;
      color: rgba(255,220,160,0.7);
    }

    /* 底部LOVELIVE水印 */
    .ll-watermark {
      position: absolute;
      bottom: 30px;
      font-size: 9px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      z-index: 20;
      animation: fade-in 1s ease 1.5s forwards;
      opacity: 0;
    }
    @keyframes fade-in { to { opacity: 1; } }

    /* ========== 主内容 ========== */
    .main {
      display: none;
      opacity: 0;
      transition: opacity 1s ease;
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }
    .main.show { display: block; opacity: 1; }

    .bg-main {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(20,40,100,0.5) 0%, #050a18 70%);
    }

    .content {
      position: relative; z-index: 1;
      display: flex; align-items: center; gap: 24px;
    }
    .album-art {
      width: 120px; height: 120px; border-radius: 16px; object-fit: cover;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08), 0 0 50px rgba(100,180,255,0.15);
      flex-shrink: 0;
      animation: album-in 0.8s cubic-bezier(0.4,0,0.2,1) 0.1s both;
    }
    @keyframes album-in {
      0% { transform: scale(0.85) translateX(-20px); opacity: 0; }
      100% { transform: scale(1) translateX(0); opacity: 1; }
    }
    .info { flex: 1; animation: album-in 0.8s ease 0.2s both; }
    .song-title { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; color: #fff; }
    .song-subtitle { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 18px; letter-spacing: 0.5px; }
    .play-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 28px; border-radius: 50px;
      background: linear-gradient(90deg, #e03060, #c02050);
      border: none; cursor: pointer;
      box-shadow: 0 6px 24px rgba(200,30,60,0.4), 0 0 0 1px rgba(255,255,255,0.05);
      transition: all 0.2s ease;
      font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 2px; align-self: flex-start;
    }
    .play-btn:active { transform: scale(0.96); }
    .play-btn svg { width: 16px; height: 16px; fill: #fff; }
    .tap-hint { margin-top: 10px; font-size: 11px; color: rgba(255,255,255,0.25); }
    .status { margin-top: 14px; font-size: 12px; padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); opacity: 0; transition: opacity 0.3s; text-align: center; }
    .status.show { opacity: 1; }
    .status.ok { color: #4ade80; border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.08); }
    .status.fail { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.08); }
    .fallback-btn { display: none; margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.4); background: none; border: none; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; align-self: flex-start; }
    .fallback-btn.show { display: block; }
    .nfc-hint { position: fixed; bottom: 24px; left: 0; right: 0; text-align: center; font-size: 11px; color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <!-- ========== 开场动画 ========== -->
  <div class="intro" id="intro">
    <div class="stars" id="stars"></div>
    <div class="warm-glow"></div>

    <div class="rings-container">
      <div class="ring-3d ring-outer"></div>
      <div class="ring-3d ring-mid"></div>
      <div class="ring-3d ring-inner"></div>
      <div class="center-core"></div>
    </div>

    <div class="title-layer" style="top:calc(50% + 160px);">
      <div class="title-en">Circle of Love</div>
      <div class="title-main">L！L！L！</div>
      <div class="title-cn">爱的回环</div>
    </div>

    <div class="ll-watermark">Love Live! 虹咲学園</div>
  </div>

  <!-- ========== 主内容 ========== -->
  <div class="bg-main"></div>
  <div class="main" id="main">
    <div class="content">
      <img class="album-art" src="https://4ad2f463258bc8e2-106-53-185-132.serveousercontent.com/album-cover.jpg" alt="album art">
      <div class="info">
        <div class="song-title">L！L！L！</div>
        <div class="song-subtitle">宮下愛 · Circle of Love</div>
        <button class="play-btn" id="playBtn" onclick="startPlay()">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          开始播放
        </button>
        <div class="tap-hint" id="tapHint">👆 请轻触按钮启动网易云音乐</div>
        <div class="status" id="status"></div>
        <button class="fallback-btn" id="fallbackBtn" onclick="openWebVersion()">未能启动？点此打开网页版</button>
      </div>
    </div>
  </div>
  <div class="nfc-hint">📳 NFC 贴纸碰一碰 · 网易云音乐</div>

<script>
// 星空
(function() {
  var container = document.getElementById('stars');
  for (var i = 0; i < 40; i++) {
    var s = document.createElement('div');
    s.className = 'star';
    var size = 1 + Math.random() * 2.5;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = Math.random() * 3 + 's';
    s.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    container.appendChild(s);
  }
})();

// 5秒后切换
setTimeout(function() {
  document.getElementById('intro').classList.add('fade-out');
  setTimeout(function() {
    document.getElementById('intro').classList.add('hidden');
    document.getElementById('main').classList.add('show');
  }, 1200);
}, 5000);

// 播放逻辑
var SONG_ID = '1887056125';
var NETEASE_SCHEME = 'orpheus://song/' + SONG_ID;
var ANDROID_INTENT = 'intent://orpheus/song/' + SONG_ID + '#Intent;scheme=orpheus;package=com.netease.cloudmusic;end';
var WEB_URL = 'https://y.music.163.com/m/song?id=' + SONG_ID;
var isAndroid = /Android/i.test(navigator.userAgent);
var playing = false, launched = false;
var status = document.getElementById('status');
var fallbackBtn = document.getElementById('fallbackBtn');
var tapHint = document.getElementById('tapHint');

function showStatus(msg, cls) { status.textContent = msg; status.className = 'status show ' + (cls || ''); }
function openWebVersion() { window.location.href = WEB_URL; }

function startPlay() {
  if (playing) return;
  playing = true; launched = false;
  tapHint.style.display = 'none';
  showStatus('正在启动网易云音乐…', '');
  if (isAndroid) {
    window.location.href = ANDROID_INTENT;
    setTimeout(function() { if (!document.hidden && !launched) { launched = true; window.location.href = NETEASE_SCHEME; } }, 1200);
    setTimeout(function() { if (!document.hidden && !launched) { launched = true; fallbackBtn.classList.add('show'); } }, 2500);
  } else {
    window.location.href = NETEASE_SCHEME;
    setTimeout(function() { if (!document.hidden) openWebVersion(); }, 2000);
  }
}
document.addEventListener('visibilitychange', function() {
  if (document.hidden) { launched = true; showStatus('🎉 网易云音乐已启动', 'ok'); }
});
</script>
</body>
</html>
