<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宫下爱 · Circle of Love</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0012; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: system-ui, sans-serif; overflow: hidden; position: relative; }

/* 深色霓虹背景 */
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 50% 30%, rgba(120,40,160,.25) 0%, rgba(20,0,30,.9) 70%); z-index: 0; }

/* 中心聚光 */
.spotlight { position: fixed; top: 20%; left: 50%; transform: translateX(-50%); width: 500px; height: 500px; background: radial-gradient(ellipse at center, rgba(255,100,180,.15) 0%, transparent 70%); pointer-events: none; z-index: 1; animation: spot-pulse 3s ease-in-out infinite; }
@keyframes spot-pulse { 0%,100%{opacity:.6;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.1)} }

/* 环形光芒 - 多层 */
.rings { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: 2; pointer-events: none; }
.ring { position: absolute; top: 50%; left: 50%; border-radius: 50%; border: 2px solid transparent; transform: translate(-50%,-50%); }
.ring:nth-child(1){width:200px;height:200px;border-color:rgba(255,100,180,.6);border-right-color:transparent;animation:spin 3s linear infinite,ring-fade 1.5s ease-out forwards;opacity:0}
.ring:nth-child(2){width:260px;height:260px;border-color:rgba(200,120,255,.5);border-bottom-color:transparent;animation:spin 4s linear infinite reverse,ring-fade 1.5s .2s ease-out forwards;opacity:0}
.ring:nth-child(3){width:320px;height:320px;border-color:rgba(100,180,255,.4);border-top-color:transparent;animation:spin 5s linear infinite,ring-fade 1.5s .4s ease-out forwards;opacity:0}
.ring:nth-child(4){width:380px;height:380px;border-color:rgba(255,150,100,.3);border-left-color:transparent;animation:spin 6s linear infinite reverse,ring-fade 1.5s .6s ease-out forwards;opacity:0}
.ring:nth-child(5){width:440px;height:440px;border-color:rgba(255,220,100,.2);animation:spin 8s linear infinite,ring-fade 1.5s .8s ease-out forwards;opacity:0}
@keyframes spin { to{transform:translate(-50%,-50%) rotate(360deg)} }
@keyframes ring-fade { 0%{opacity:0;transform:translate(-50%,-50%) scale(.5)} 100%{opacity:1;transform:translate(-50%,-50%) scale(1)} }

/* 粒子散射 */
.particles { position: fixed; top: 50%; left: 50%; z-index: 3; pointer-events: none; }
.particle { position: absolute; width: 4px; height: 4px; border-radius: 50%; background: #ff64b4; opacity: 0; animation: particle-burst 2s ease-out forwards; }
.particle:nth-child(odd){background:#c878ff}
.particle:nth-child(3n){background:#64c8ff}
.particle:nth-child(5n){background:#ffaa64}
@keyframes particle-burst { 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)} }

/* 角色卡片 */
.card-wrap { position: relative; z-index: 10; text-align: center; opacity: 0; animation: card-reveal 1s 1.2s ease-out forwards; }
@keyframes card-reveal { 0%{opacity:0;transform:scale(.7) translateY(30px)} 100%{opacity:1;transform:scale(1) translateY(0)} }

.card { width: 200px; height: 280px; border-radius: 20px; background: linear-gradient(145deg, #1a0a25, #0d0320); border: 2px solid rgba(255,100,180,.4); box-shadow: 0 0 40px rgba(255,100,180,.3), 0 20px 60px rgba(0,0,0,.5); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0 auto; position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; inset: -50%; background: conic-gradient(from 0deg, transparent 0deg, rgba(255,100,180,.1) 60deg, transparent 120deg, rgba(200,120,255,.1) 180deg, transparent 240deg, rgba(100,180,255,.1) 300deg, transparent 360deg); animation: card-glow 4s linear infinite; }
@keyframes card-glow { to{transform:rotate(360deg)} }
.card-inner { position: relative; z-index: 1; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }

.avatar { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #ff64b4, #c878ff); display: flex; align-items: center; justify-content: center; font-size: 48px; box-shadow: 0 0 30px rgba(255,100,180,.5); margin-bottom: 12px; }
.name { color: #fff; font-size: 16px; font-weight: bold; margin-bottom: 4px; text-shadow: 0 0 10px rgba(255,100,180,.5); }
.sub { color: rgba(255,255,255,.5); font-size: 11px; margin-bottom: 10px; }
.rarity-badge { padding: 4px 16px; border-radius: 20px; background: linear-gradient(90deg, #ff64b4, #c878ff); color: #fff; font-size: 11px; font-weight: bold; letter-spacing: 2px; box-shadow: 0 0 20px rgba(255,100,180,.4); }
.attr { display: flex; gap: 6px; margin-top: 10px; }
.attr-dot { width: 10px; height: 10px; border-radius: 50%; }

/* 歌曲信息 */
.song-info { margin-top: 20px; color: rgba(255,255,255,.6); font-size: 13px; opacity: 0; animation: fade-in 1s 1.8s ease-out forwards; }
.song-title { color: #ff64b4; font-size: 15px; font-weight: bold; margin-top: 6px; }
@keyframes fade-in { to{opacity:1} }

/* 底部光芒 */
.bottom-glow { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); width: 600px; height: 300px; background: radial-gradient(ellipse at top, rgba(200,120,255,.2) 0%, transparent 70%); z-index: 1; animation: bottom-pulse 2s ease-in-out infinite; }
@keyframes bottom-pulse { 0%,100%{opacity:.5} 50%{opacity:.8} }

/* 标签 */
.tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; margin-top: 8px; border: 1px solid rgba(255,100,180,.3); color: rgba(255,255,255,.5); }

/* 重新播放按钮 */
.replay-btn { margin-top: 30px; padding: 10px 28px; border-radius: 50px; background: transparent; border: 1px solid rgba(255,100,180,.5); color: #ff64b4; font-size: 13px; cursor: pointer; transition: all .3s; opacity: 0; animation: fade-in 1s 2.5s ease-out forwards; }
.replay-btn:hover { background: rgba(255,100,180,.1); border-color: #ff64b4; box-shadow: 0 0 20px rgba(255,100,180,.3); }
</style>
</head>
<body>

<div class="spotlight"></div>
<div class="bottom-glow"></div>

<div class="rings" id="rings">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

<div class="particles" id="particles"></div>

<div class="card-wrap">
  <div class="card">
    <div class="card-inner">
      <div class="avatar">❤️</div>
      <div class="name">宫下爱</div>
      <div class="sub">宮下愛 / Mia Taylor</div>
      <div class="rarity-badge">S R</div>
      <div class="attr">
        <div class="attr-dot" style="background:#ff64b4"></div>
        <div class="attr-dot" style="background:#c878ff"></div>
        <div class="attr-dot" style="background:#64c8ff"></div>
      </div>
      <div class="tag">#Circle of Love</div>
    </div>
  </div>
  <div class="song-info">
    🎵 Solo曲
    <div class="song-title">Circle of Love ― Love Live! 虹咲</div>
  </div>
  <button class="replay-btn" onclick="replay()">↺ 重播特效</button>
</div>

<script>
// 生成粒子
function spawnParticles(count = 30) {
  const container = document.getElementById('particles');
  container.innerHTML = '';
  for(let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / count) * Math.PI * 2;
    const dist = 100 + Math.random() * 200;
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    p.style.animationDelay = (Math.random() * 0.5) + 's';
    p.style.width = (3 + Math.random() * 4) + 'px';
    p.style.height = p.style.width;
    container.appendChild(p);
  }
}

// 重播
function replay() {
  // 重置环
  const rings = document.querySelectorAll('.ring');
  rings.forEach(r => { r.style.animation='none'; r.offsetHeight; r.style.animation=''; });
  spawnParticles();
}

// 自动
spawnParticles();
</script>
</body>
</html>
